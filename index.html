<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
  <title>ニコリタウン - ホーム</title>
  <style>
    :root{
      color-scheme:dark;
      --bg:#0f172a;--card:#111827;--panel:#0b1220;--border:#334155;
      --text:#e2e8f0;--muted:#94a3b8;--a1:#22d3ee;--a2:#06b6d4;--danger:#ef4444;--ok:#22c55e;
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100svh;padding:18px;display:grid;place-items:center;font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:radial-gradient(circle at 20% 12%,rgba(34,211,238,.18),transparent 32%),radial-gradient(circle at 85% 18%,rgba(59,130,246,.14),transparent 30%),var(--bg);color:var(--text)}
    button,input{font:inherit}button{cursor:pointer}
    .card{width:min(900px,94vw);background:rgba(17,24,39,.94);border:1px solid rgba(148,163,184,.18);border-radius:22px;padding:28px;box-shadow:0 24px 80px rgba(0,0,0,.42),inset 0 0 0 1px rgba(255,255,255,.04);backdrop-filter:blur(10px)}
    .pill{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;margin-bottom:12px;border-radius:999px;background:rgba(14,165,233,.16);border:1px solid rgba(34,211,238,.25);color:#a5f3fc;font-size:12px;font-weight:800}
    .logo-line{display:flex;gap:12px;align-items:center;margin-bottom:8px}.logo-mark{width:50px;height:50px;border-radius:15px;display:grid;place-items:center;font-size:27px;background:radial-gradient(circle at 35% 30%,#67e8f9,#0891b2 58%,#0f172a);box-shadow:inset 0 0 0 1px rgba(255,255,255,.22),0 14px 34px rgba(6,182,212,.16);flex-shrink:0}
    h1{margin:0;font-size:clamp(24px,4vw,34px);letter-spacing:.03em}.lead{margin:8px 0 22px;color:var(--muted);line-height:1.75}.screen{margin-top:18px;padding:18px;border-radius:18px;background:rgba(15,23,42,.72);border:1px solid rgba(148,163,184,.20)}.screen[hidden]{display:none}.grid{display:grid;gap:14px}.two{grid-template-columns:repeat(2,minmax(0,1fr))}@media(max-width:720px){.two{grid-template-columns:1fr}.card{padding:22px}}
    h2{margin:0 0 14px;font-size:20px}label{display:grid;gap:8px;font-weight:800;font-size:14px}input,button{border-radius:13px;outline:none}input{width:100%;border:1px solid var(--border);background:#07101f;color:var(--text);padding:12px 13px}input:focus{border-color:var(--a1);box-shadow:0 0 0 3px rgba(34,211,238,.20)}button{border:0;padding:12px 14px;background:linear-gradient(180deg,var(--a1),var(--a2));color:#06202a;font-weight:900}button.secondary{background:#1e293b;border:1px solid var(--border);color:var(--text)}button.google{background:#fff;color:#111827;border:1px solid #e5e7eb}button:disabled{opacity:.55;cursor:not-allowed}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.right{justify-content:flex-end}.notice{margin:12px 0 0;color:var(--muted);font-size:13px;line-height:1.7}.status{min-height:22px;margin-top:12px;color:#a5f3fc;font-size:13px;font-weight:700}.userBox{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin:8px 0 4px;padding:12px 14px;border-radius:16px;background:rgba(2,6,23,.28);border:1px solid rgba(148,163,184,.22)}.userName{font-weight:900}.userSub{font-size:12px;color:var(--muted);margin-top:3px}
    .skin-picker{margin:16px 0;padding:14px;border:1px solid rgba(148,163,184,.24);border-radius:18px;background:rgba(2,6,23,.25)}.skin-picker-title{font-weight:900;letter-spacing:.04em;margin-bottom:10px}.skin-choice-row{display:flex;gap:10px;flex-wrap:wrap}.skin-choice{min-width:150px;display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:16px;border:1px solid rgba(148,163,184,.28);background:rgba(15,23,42,.70);color:#e5f3ff}.skin-choice img{width:42px;height:42px;image-rendering:pixelated;object-fit:contain}.map-choice{min-width:190px}.map-choice img{width:64px;height:42px;border-radius:8px;image-rendering:auto;object-fit:cover}.skin-choice.active{border-color:rgba(34,211,238,.9);box-shadow:0 0 0 3px rgba(34,211,238,.18),0 14px 30px rgba(34,211,238,.10);background:linear-gradient(135deg,rgba(14,165,233,.36),rgba(15,23,42,.78))}.skin-picker-note{margin-top:8px;font-size:12px;color:var(--muted)}
  </style>
</head>
<body>
  <main class="card">
    <div class="pill">β版・テスト中 ／ Google・ゲストログイン対応</div>
    <div class="logo-line"><div class="logo-mark">✈️</div><div><h1>ニコリタウン</h1><p class="lead">歩き回って、同じルームの人と話せる2Dタウン。ルーム名だけで入室できます。</p></div></div>

    <section id="loginScreen" class="screen">
      <h2>ログイン</h2>
      <label>ゲスト表示名<input id="guestName" maxlength="16" placeholder="例）こっぴー" autocomplete="off" /></label>
      <div class="row right" style="margin-top:14px"><button id="googleLoginBtn" class="google">Googleでログイン</button><button id="guestLoginBtn">ゲストとしてログイン</button></div>
      <p class="notice">ログインID・認証パスワード・アカウント作成は使いません。Googleログインまたはゲストログインだけ残しています。</p>
      <div id="loginStatus" class="status"></div>
    </section>

    <section id="roomScreen" class="screen" hidden>
      <div class="userBox"><div><div class="userName" id="currentUserName">-</div><div class="userSub" id="currentUserType">-</div></div><button id="logoutBtn" class="secondary">ログアウト</button></div>
      <h2>ルーム</h2>
      <div class="grid two">
        <label>ルーム名<input id="roomName" maxlength="32" placeholder="例）park-001" autocomplete="off" /></label>
        <label>表示名<input id="playerName" maxlength="16" placeholder="例）こっぴー" autocomplete="off" /></label>
      </div>
      <div id="skinPicker" class="skin-picker" aria-label="スキン変更">
        <div class="skin-picker-title">スキン変更</div>
        <div class="skin-choice-row">
          <button type="button" class="skin-choice" data-skin="nikorihito" aria-pressed="false"><img src="./nikorihito_dot_front.png" alt="" /><span>ニコリヒト</span></button>
          <button type="button" class="skin-choice" data-skin="turuturu" aria-pressed="false"><img src="./turuturu_front.png" alt="" /><span>つるつる君</span></button>
        </div>
        <div class="skin-picker-note">飛行機はどちらのスキンでも共通です。</div>
      </div>
      <div id="mapPicker" class="skin-picker" aria-label="マップ変更">
        <div class="skin-picker-title">マップ変更</div>
        <div id="mapChoiceRow" class="skin-choice-row"></div>
        <div class="skin-picker-note">ここで選んだマップでルームに入ります。入室後もメニューから変更できます。</div>
      </div>
      <div class="row right"><button id="randomRoomBtn" class="secondary">ランダム名</button><button id="enterRoomBtn">ルームに入る</button></div>
      <p class="notice">ルームパスワードは使いません。同じルーム名を入力した人が同じ部屋に入ります。</p>
      <div id="roomStatus" class="status"></div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js';
    import { getAuth, GoogleAuthProvider, signInWithPopup, signInAnonymously, onAuthStateChanged, signOut, updateProfile } from 'https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js';
    import { getDatabase, ref, update } from 'https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js';

    const firebaseConfig = {
      apiKey: 'AIzaSyCy3P-HQhfd8-zpPUJ5YANxwRMuTCjFFAQ',
      authDomain: 'nikori-town.firebaseapp.com',
      databaseURL: 'https://nikori-town-default-rtdb.asia-southeast1.firebasedatabase.app',
      projectId: 'nikori-town',
      storageBucket: 'nikori-town.appspot.com',
      messagingSenderId: '836836010871',
      appId: '1:836836010871:web:74ae40cb16ee6d50368f72'
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app, firebaseConfig.databaseURL);
    const $ = id => document.getElementById(id);
    const LS_ROOM = 'nikoriTown.lastRoom';
    const LS_NAME = 'nikoriTown.playerName';
    const LS_SKIN = 'nikoriTown.skin';
    const LS_MAP = 'nikoriTown.currentMap';

    const MAPS = [
      { name: 'タウン', map: './map_1.png' },
      { name: '湖畔公園', map: './map/textures/lakeside_park.png' },
      { name: '森', map: './map/textures/forest.png' },
      { name: '海底都市', map: './map/textures/underwater_city.png' },
      { name: '空中都市', map: './map/textures/sky_city.png' },
      { name: 'サイバーシティ', map: './map/textures/cyber_city.png' },
      { name: '白オフィス 1F', map: './map/textures/office_white/office_white_1f.png' },
      { name: '白オフィス 2F', map: './map/textures/office_white/office_white_2f.png' },
      { name: '白オフィス 屋上', map: './map/textures/office_white/office_white_rooftop.png' },
      { name: '黒オフィス 1F', map: './map/textures/office_black/office_black_1f.png' },
      { name: '黒オフィス 2F', map: './map/textures/office_black/office_black_2f.png' },
      { name: '黒オフィス 屋上', map: './map/textures/office_black/office_black_rooftop.png' },
      { name: 'カフェ 1F', map: './map/textures/cafe/cafe_1f.png' },
      { name: 'カフェ 2F', map: './map/textures/cafe/cafe_2f.png' },
      { name: 'カフェ 屋上', map: './map/textures/cafe/cafe_rooftop.png' }
    ];

    $('guestName').value = localStorage.getItem(LS_NAME) || '';
    $('roomName').value = localStorage.getItem(LS_ROOM) || '';
    $('playerName').value = localStorage.getItem(LS_NAME) || '';

    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });

    function setLoginStatus(text){ $('loginStatus').textContent = text || ''; }
    function setRoomStatus(text){ $('roomStatus').textContent = text || ''; }
    function safeRoom(raw){ return String(raw || '').trim().toLowerCase().replace(/[.#$/\[\]\/]/g,'-').replace(/[^\w\-ぁ-んァ-ヶ一-龠]/g,'-').replace(/-+/g,'-').slice(0,32); }
    function safeName(raw){ const name = String(raw || '').trim().slice(0,16); return name || 'ゲスト'; }
    function normalizeSkin(raw){ return raw === 'turuturu' ? 'turuturu' : 'nikorihito'; }
    function getSelectedSkin(){ return normalizeSkin(localStorage.getItem(LS_SKIN) || 'nikorihito'); }
    function normalizeMap(raw){
      const index = Number(raw);
      return Number.isFinite(index) && index >= 0 && index < MAPS.length ? index : 0;
    }
    function getSelectedMap(){ return normalizeMap(localStorage.getItem(LS_MAP) || '0'); }
    function setSelectedSkin(skin){
      const value = normalizeSkin(skin);
      localStorage.setItem(LS_SKIN, value);
      document.querySelectorAll('[data-skin]').forEach(btn => {
        const active = btn.dataset.skin === value;
        btn.classList.toggle('active', active);
        btn.setAttribute('aria-pressed', String(active));
      });
    }
    function initSkinPicker(){
      document.querySelectorAll('[data-skin]').forEach(btn => btn.onclick = () => setSelectedSkin(btn.dataset.skin));
      setSelectedSkin(getSelectedSkin());
    }
    function setSelectedMap(index){
      const value = normalizeMap(index);
      localStorage.setItem(LS_MAP, String(value));
      document.querySelectorAll('[data-map]').forEach(btn => {
        const active = Number(btn.dataset.map) === value;
        btn.classList.toggle('active', active);
        btn.setAttribute('aria-pressed', String(active));
      });
    }
    function initMapPicker(){
      const row = $('mapChoiceRow');
      row.innerHTML = '';
      MAPS.forEach((map, index) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'skin-choice map-choice';
        button.dataset.map = String(index);
        button.setAttribute('aria-pressed', 'false');
        button.innerHTML = `<img src="${map.map}" alt="" /><span>${map.name}</span>`;
        button.onclick = () => setSelectedMap(index);
        row.appendChild(button);
      });
      setSelectedMap(getSelectedMap());
    }
    function userName(user){ return safeName(user?.displayName || localStorage.getItem(LS_NAME) || 'ゲスト'); }

    async function loginGuest(){
      $('guestLoginBtn').disabled = true; $('googleLoginBtn').disabled = true; setLoginStatus('ゲストログイン中...');
      try {
        const name = safeName($('guestName').value);
        localStorage.setItem(LS_NAME, name);
        const cred = await signInAnonymously(auth);
        try { await updateProfile(cred.user, { displayName:name }); } catch {}
        setLoginStatus('');
      } catch (e) {
        console.error(e); setLoginStatus('ゲストログインに失敗しました。Firebase Authentication の匿名ログインを有効化してください。');
      } finally {
        $('guestLoginBtn').disabled = false; $('googleLoginBtn').disabled = false;
      }
    }
    async function loginGoogle(){
      $('guestLoginBtn').disabled = true; $('googleLoginBtn').disabled = true; setLoginStatus('Googleログイン中...');
      try {
        const cred = await signInWithPopup(auth, provider);
        const name = safeName(cred.user.displayName || 'Googleユーザー');
        localStorage.setItem(LS_NAME, name);
        $('playerName').value = name;
        setLoginStatus('');
      } catch (e) {
        console.error(e); setLoginStatus('Googleログインに失敗しました。Firebase Authentication の Google プロバイダを確認してください。');
      } finally {
        $('guestLoginBtn').disabled = false; $('googleLoginBtn').disabled = false;
      }
    }
    async function logout(){ await signOut(auth); }

    onAuthStateChanged(auth, user => {
      const loggedIn = !!user;
      $('loginScreen').hidden = loggedIn;
      $('roomScreen').hidden = !loggedIn;
      if (loggedIn) {
        const name = userName(user);
        $('currentUserName').textContent = name;
        $('currentUserType').textContent = user.isAnonymous ? 'ゲストログイン' : 'Googleログイン';
        if (!$('playerName').value) $('playerName').value = name;
        localStorage.setItem(LS_NAME, name);
      }
    });

    async function enterRoom(){
      const user = auth.currentUser;
      if (!user) { setRoomStatus('先にGoogleログインまたはゲストログインしてください。'); return; }
      const room = safeRoom($('roomName').value);
      if (!room) { setRoomStatus('ルーム名を入力してください。'); $('roomName').focus(); return; }
      const name = safeName($('playerName').value || userName(user));
      const skin = getSelectedSkin();
      const mapIndex = getSelectedMap();
      localStorage.setItem(LS_ROOM, room); localStorage.setItem(LS_NAME, name); localStorage.setItem(LS_SKIN, skin); localStorage.setItem(LS_MAP, String(mapIndex));
      $('enterRoomBtn').disabled = true; setRoomStatus('ルームを準備しています...');
      try {
        if (user.isAnonymous && user.displayName !== name) { try { await updateProfile(user, { displayName:name }); } catch {} }
        await update(ref(db, `roomMeta/${room}`), { room, noAccountMode:true, passwordEnabled:false, authMode:user.isAnonymous ? 'guest' : 'google', updatedAt:Date.now(), lastJoinUid:user.uid });
        await update(ref(db, `rooms/${room}/roomState`), { mapIndex, updatedAt:Date.now() }).catch(console.warn);
        const u = new URL('./room.html', location.href);
        u.searchParams.set('room', room); u.searchParams.set('name', name); u.searchParams.set('skin', skin); u.searchParams.set('map', String(mapIndex));
        location.href = u.toString();
      } catch (e) {
        console.error(e); setRoomStatus('入室準備に失敗しました。Firebaseの設定またはDBルールを確認してください。'); $('enterRoomBtn').disabled = false;
      }
    }

    $('guestLoginBtn').onclick = loginGuest;
    $('googleLoginBtn').onclick = loginGoogle;
    $('logoutBtn').onclick = logout;
    $('enterRoomBtn').onclick = enterRoom;
    $('roomName').addEventListener('keydown', e => { if (e.key === 'Enter') enterRoom(); });
    $('playerName').addEventListener('keydown', e => { if (e.key === 'Enter') enterRoom(); });
    $('guestName').addEventListener('keydown', e => { if (e.key === 'Enter') loginGuest(); });
    $('randomRoomBtn').onclick = () => { $('roomName').value = 'room-' + Math.random().toString(36).slice(2,7); $('roomName').focus(); };
    initSkinPicker();
    initMapPicker();
  </script>
</body>
</html>
