function isTyping(){return ['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName)}const keys=new Set();addEventListener('keydown',e=>{if(isTyping())return;keys.add(e.key);const k=e.key.toLowerCase();if(!e.repeat&&k==='h'&&keys.has('ArrowDown')){setFlight(!isFlying);e.preventDefault()}if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','a','s','d'].includes(e.key)||['w','a','s','d'].includes(k))e.preventDefault()});addEventListener('keyup',e=>keys.delete(e.key));
let joy={x:0,y:0,active:false};function updateJoy(touch){const r=joyBase.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2,dx=touch.clientX-cx,dy=touch.clientY-cy,max=r.width*.34;joy.x=clamp(dx/max,-1,1);joy.y=clamp(dy/max,-1,1);joyStick.style.transform=`translate(calc(-50% + ${clamp(dx,-max,max)}px), calc(-50% + ${clamp(dy,-max,max)}px))`}joyBase.addEventListener('touchstart',e=>{joy.active=true;updateJoy(e.touches[0])},{passive:false});joyBase.addEventListener('touchmove',e=>{e.preventDefault();updateJoy(e.touches[0])},{passive:false});joyBase.addEventListener('touchend',()=>{joy.active=false;joy.x=0;joy.y=0;joyStick.style.transform='translate(-50%,-50%)'});
function setFlight(on){if(on===isFlying)return;if(!on&&hits(my.x,my.y)){showToast('ここでは着地できません。当たり判定の外で着地してください。');return}isFlying=on;my.fly=isFlying;syncMe(true);showToast(isFlying?'飛行機に乗りました':'歩きに戻りました')}function move(dt){let dx=0,dy=0;if(keys.has('ArrowLeft')||keys.has('a')||keys.has('A'))dx-=1;if(keys.has('ArrowRight')||keys.has('d')||keys.has('D'))dx+=1;if(keys.has('ArrowUp')||keys.has('w')||keys.has('W'))dy-=1;if(keys.has('ArrowDown')||keys.has('s')||keys.has('S'))dy+=1;if(joy.active){dx+=joy.x;dy+=joy.y}if(dx===0&&dy===0)return;const len=Math.hypot(dx,dy)||1;dx/=len;dy/=len;if(Math.abs(dx)>Math.abs(dy))my.dir=dx<0?'left':'right';else my.dir=dy<0?'behind':'front';const speed=isFlying?FLY_SPEED_PPS:SPEED_PPS,nx=clamp(my.x+dx*speed*dt,0,world.w-1),ny=clamp(my.y+dy*speed*dt,0,world.h-1);if(isFlying||!hits(nx,my.y))my.x=nx;if(isFlying||!hits(my.x,ny))my.y=ny;syncMe()}
function spriteByDir(d,skinId=mySkin){const skin=SKINS[normalizeSkin(skinId)]||SKINS.nikorihito;if(d==='behind')return{img:skin.behind,skinId:normalizeSkin(skinId)};if(d==='left')return{img:skin.left,skinId:normalizeSkin(skinId)};if(d==='right')return{img:skin.right,skinId:normalizeSkin(skinId)};return{img:skin.front,skinId:normalizeSkin(skinId)}}
function camera(dt){const tx=Math.round(my.x-viewW/2),ty=Math.round(my.y-viewH/2),k=Math.min(1,dt*CAM_INTERP);camX+=(tx-camX)*k;camY+=(ty-camY)*k;camX=clamp(camX,0,Math.max(0,world.w-viewW));camY=clamp(camY,0,Math.max(0,world.h-viewH));return{x:camX,y:camY}}function drawImageCentered(img,x,y,w,h,alpha=1){ctx.save();ctx.globalAlpha=alpha;ctx.imageSmoothingEnabled=false;ctx.drawImage(img,x-w/2,y-h/2,w,h);ctx.restore()}function roundRect(g,x,y,w,h,r){g.beginPath();g.moveTo(x+r,y);g.arcTo(x+w,y,x+w,y+h,r);g.arcTo(x+w,y+h,x,y+h,r);g.arcTo(x,y+h,x,y,r);g.arcTo(x,y,x+w,y,r);g.closePath()}
function drawPlayer(p,id,cam){const sx=Math.round(p.x-cam.x),sy=Math.round(p.y-cam.y);let labelY;if(p.fly){const h=AIRPLANE_HEIGHT,w=h*(assetW(imgPlane)/assetH(imgPlane));drawImageCentered(imgPlane,sx,sy+8,w,h,1);labelY=sy+8-h/2-16;drawTinyPilot(p.skin||'nikorihito',sx,sy-28)}else{const sp=spriteByDir(p.dir||'front',p.skin||mySkin),targetH=DRAW_HEIGHT[sp.skinId]||96,targetW=assetW(sp.img)*(targetH/assetH(sp.img));drawImageCentered(sp.img,sx,sy,targetW,targetH,1);ctx.save();ctx.globalAlpha=.28;ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(sx,sy+targetH*.42,Math.max(15,targetW*.32),7,0,0,Math.PI*2);ctx.fill();ctx.restore();labelY=sy-targetH/2-16}const name=p.name||'guest';ctx.save();ctx.font='700 13px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';const textW=ctx.measureText(name).width;ctx.fillStyle='rgba(15,23,42,.72)';ctx.strokeStyle='rgba(148,163,184,.45)';ctx.lineWidth=1;roundRect(ctx,sx-textW/2-8,labelY-10,textW+16,20,8);ctx.fill();ctx.stroke();ctx.fillStyle='#e2e8f0';ctx.fillText(name,sx,labelY);ctx.restore()}
function drawTinyPilot(skinId,x,y){const img=SKINS[normalizeSkin(skinId)].front;const h=normalizeSkin(skinId)==='turuturu'?34:28,w=assetW(img)*(h/assetH(img));drawImageCentered(img,x,y,w,h,1)}
function updateBubbles(cam){for(const[uid,el]of bubbles){const p=uid===meId?my:ghosts[uid];if(!p){el.style.display='none';continue}el.style.left=`${p.x-cam.x}px`;el.style.top=`${p.y-cam.y-72}px`}}function interpolateGhosts(dt){const k=Math.min(1,dt*PLAYER_INTERP);for(const[id,g]of Object.entries(ghosts)){if(id===meId)continue;if(typeof g.tx==='number')g.x+=(g.tx-g.x)*k;if(typeof g.ty==='number')g.y+=(g.ty-g.y)*k}}
let last=performance.now();function frame(t){const dt=Math.min(.05,(t-last)/1000);last=t;move(dt);interpolateGhosts(dt);const cam=camera(dt);ctx.clearRect(0,0,viewW,viewH);ctx.imageSmoothingEnabled=false;ctx.drawImage(imgMap,-Math.round(cam.x),-Math.round(cam.y));const drawList=[];for(const[id,g]of Object.entries(ghosts))if(id!==meId)drawList.push([id,g]);drawList.push([meId,my]);drawList.sort((a,b)=>(a[1].y||0)-(b[1].y||0));for(const[id,p]of drawList)drawPlayer(p,id,cam);updateBubbles(cam);requestAnimationFrame(frame)}requestAnimationFrame(frame);setInterval(()=>syncMe(true),2500);

const avGrid=$('avGrid'),audioUnlock=$('audioUnlock');let localStream=new MediaStream(),screenStream=null,peers=new Map(),remoteStreams=new Map(),mediaState={mic:false,cam:false,screen:false};const signalToMe=ref(db,`rooms/${ROOM}/signals/${meId}`);
function setBtnState(){for(const id of ['micBtn','mobileMicBtn'])$(id).classList.toggle('on',mediaState.mic);for(const id of ['camBtn','mobileCamBtn'])$(id).classList.toggle('on',mediaState.cam);$('screenBtn').classList.toggle('on',mediaState.screen)}function addLocalTrack(track){localStream.addTrack(track);track.onended=()=>{removeLocalTrack(track)}}function removeLocalTrack(track){try{track.stop()}catch{}try{localStream.removeTrack(track)}catch{}}function clearKind(kind){for(const t of localStream.getTracks().filter(t=>t.kind===kind))removeLocalTrack(t)}
async function toggleMic(){try{if(mediaState.mic){clearKind('audio');mediaState.mic=false}else{const s=await navigator.mediaDevices.getUserMedia({audio:true});s.getAudioTracks().forEach(addLocalTrack);mediaState.mic=true}setBtnState();renderLocalAv();rebuildPeers()}catch(e){console.error(e);showToast('マイクを開始できませんでした')}}
async function toggleCam(){try{if(mediaState.cam){clearKind('video');mediaState.cam=false}else{const s=await navigator.mediaDevices.getUserMedia({video:true,audio:false});s.getVideoTracks().forEach(addLocalTrack);mediaState.cam=true}setBtnState();renderLocalAv();rebuildPeers()}catch(e){console.error(e);showToast('カメラを開始できませんでした')}}

$('micBtn').onclick=toggleMic;$('mobileMicBtn').onclick=toggleMic;$('camBtn').onclick=toggleCam;$('mobileCamBtn').onclick=toggleCam;$('screenBtn').onclick=toggleScreen;audioUnlock.onclick=()=>{document.querySelectorAll('video,audio').forEach(v=>v.play?.().catch(()=>{}));audioUnlock.style.display='none'};
function renderLocalAv(){renderAvCard(meId,NAME,localStream,true)}function renderAvCard(id,name,stream,isLocal=false){let card=document.querySelector(`[data-av-id="${id}"]`);if(!stream||stream.getTracks().length===0){if(card)card.remove();return}if(!card){card=document.createElement('div');card.className='avCard';card.dataset.avId=id;card.onclick=()=>card.classList.toggle('expanded');avGrid.appendChild(card)}card.innerHTML='';const hasVideo=stream.getVideoTracks().length>0;if(hasVideo){const video=document.createElement('video');video.autoplay=true;video.playsInline=true;video.muted=isLocal;video.srcObject=stream;card.appendChild(video);video.play().catch(()=>audioUnlock.style.display='block')}else{const box=document.createElement('div');box.className='audioOnly';box.textContent='🎙️';card.appendChild(box)}const label=document.createElement('div');label.className='label';label.textContent=isLocal?`${name}（自分）`:name;card.appendChild(label)}function removeAvCard(id){const card=document.querySelector(`[data-av-id="${id}"]`);if(card)card.remove()}
function sendSignal(to,type,data){return push(ref(db,`rooms/${ROOM}/signals/${to}`),{from:meId,to,type,data,ts:now()})}function getPeer(id){if(peers.has(id))return peers.get(id);const pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});peers.set(id,pc);for(const track of localStream.getTracks())pc.addTrack(track,localStream);pc.onicecandidate=e=>{if(e.candidate)sendSignal(id,'candidate',e.candidate.toJSON())};pc.ontrack=e=>{let s=remoteStreams.get(id);if(!s){s=new MediaStream();remoteStreams.set(id,s)}s.addTrack(e.track);renderAvCard(id,ghosts[id]?.name||'相手',s,false)};pc.onconnectionstatechange=()=>{if(['closed','failed','disconnected'].includes(pc.connectionState)){removeAvCard(id)}};return pc}
async function makeOffer(id){if(!localStream.getTracks().length)return;if(id===meId||meId>id)return;const pc=getPeer(id);if(pc.signalingState!=='stable')return;try{const offer=await pc.createOffer();await pc.setLocalDescription(offer);await sendSignal(id,'offer',pc.localDescription.toJSON())}catch(e){console.warn(e)}}async function handleSignal(msg){if(!msg||msg.from===meId)return;const pc=getPeer(msg.from);try{if(msg.type==='offer'){await pc.setRemoteDescription(new RTCSessionDescription(msg.data));const ans=await pc.createAnswer();await pc.setLocalDescription(ans);await sendSignal(msg.from,'answer',pc.localDescription.toJSON())}else if(msg.type==='answer'){if(pc.signalingState!=='stable')await pc.setRemoteDescription(new RTCSessionDescription(msg.data))}else if(msg.type==='candidate'){await pc.addIceCandidate(new RTCIceCandidate(msg.data))}else if(msg.type==='bye'){closePeer(msg.from)}}catch(e){console.warn(e)}}onChildAdded(signalToMe,async snap=>{const msg=snap.val();try{await remove(snap.ref)}catch{}handleSignal(msg)});
function reconcilePeers(){if(!localStream.getTracks().length)return;for(const id of Object.keys(ghosts)){if(id!==meId)makeOffer(id)}}function closePeer(id){const pc=peers.get(id);if(pc){try{pc.close()}catch{}peers.delete(id)}remoteStreams.delete(id);removeAvCard(id)}function rebuildPeers(){for(const id of peers.keys()){sendSignal(id,'bye',{});closePeer(id)}setTimeout(reconcilePeers,500)}
