<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
  <title>ニコリタウン - ホーム</title>
  <style>
    :root{
      color-scheme:dark;
      --bg:#0f172a;
      --card:#111827;
      --panel:#0b1220;
      --border:#334155;
      --text:#e2e8f0;
      --muted:#94a3b8;
      --a1:#22d3ee;
      --a2:#06b6d4;
      --danger:#ef4444;
      --ok:#22c55e;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100svh;
      padding:18px;
      display:grid;
      place-items:center;
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
      background:
        radial-gradient(circle at 20% 12%,rgba(34,211,238,.18),transparent 32%),
        radial-gradient(circle at 85% 18%,rgba(59,130,246,.14),transparent 30%),
        var(--bg);
      color:var(--text);
    }
    .card{
      width:min(860px,94vw);
      background:rgba(17,24,39,.92);
      border:1px solid rgba(148,163,184,.18);
      border-radius:22px;
      padding:28px;
      box-shadow:0 24px 80px rgba(0,0,0,.42),inset 0 0 0 1px rgba(255,255,255,.04);
      backdrop-filter:blur(10px);
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:5px 10px;
      margin-bottom:12px;
      border-radius:999px;
      background:rgba(14,165,233,.16);
      border:1px solid rgba(34,211,238,.25);
      color:#a5f3fc;
      font-size:12px;
      font-weight:800;
    }
    .logo-line{display:flex;gap:12px;align-items:center;margin-bottom:8px}
    .logo-mark{
      width:50px;height:50px;border-radius:15px;
      display:grid;place-items:center;font-size:27px;
      background:radial-gradient(circle at 35% 30%,#67e8f9,#0891b2 58%,#0f172a);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.22),0 14px 34px rgba(6,182,212,.16);
      flex-shrink:0;
    }
    h1{margin:0;font-size:clamp(24px,4vw,34px);letter-spacing:.03em}
    .lead{margin:8px 0 22px;color:var(--muted);line-height:1.75}
    .screen{
      margin-top:18px;
      padding:18px;
      border-radius:18px;
      background:rgba(15,23,42,.72);
      border:1px solid rgba(148,163,184,.20);
    }
    .grid{display:grid;gap:14px}
    .two{grid-template-columns:repeat(2,minmax(0,1fr))}
    @media(max-width:720px){.two{grid-template-columns:1fr}.card{padding:22px}}
    label{display:grid;gap:8px;font-weight:800;font-size:14px}
    input,button{font:inherit;border-radius:13px;outline:none}
    input{
      width:100%;
      border:1px solid var(--border);
      background:#07101f;
      color:var(--text);
      padding:12px 13px;
    }
    input:focus{border-color:var(--a1);box-shadow:0 0 0 3px rgba(34,211,238,.20)}
    button{
      border:0;
      padding:12px 14px;
      background:linear-gradient(180deg,var(--a1),var(--a2));
      color:#06202a;
      font-weight:900;
      cursor:pointer;
    }
    button.secondary{background:#1e293b;border:1px solid var(--border);color:var(--text)}
    button:disabled{opacity:.55;cursor:not-allowed}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .right{justify-content:flex-end}
    .notice{margin:12px 0 0;color:var(--muted);font-size:13px;line-height:1.7}
    .skin-picker{
      margin:16px 0;
      padding:14px;
      border:1px solid rgba(148,163,184,.24);
      border-radius:18px;
      background:rgba(2,6,23,.25);
    }
    .skin-picker-title{font-weight:900;letter-spacing:.04em;margin-bottom:10px}
    .skin-choice-row{display:flex;gap:10px;flex-wrap:wrap}
    .skin-choice{
      min-width:150px;
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      border-radius:16px;
      border:1px solid rgba(148,163,184,.28);
      background:rgba(15,23,42,.70);
      color:#e5f3ff;
    }
    .skin-choice img{width:42px;height:42px;image-rendering:pixelated;object-fit:contain}
    .skin-choice.active{
      border-color:rgba(34,211,238,.9);
      box-shadow:0 0 0 3px rgba(34,211,238,.18),0 14px 30px rgba(34,211,238,.10);
      background:linear-gradient(135deg,rgba(14,165,233,.36),rgba(15,23,42,.78));
    }
    .skin-picker-note{margin-top:8px;font-size:12px;color:var(--muted)}
    .status{min-height:22px;margin-top:12px;color:#a5f3fc;font-size:13px;font-weight:700}
  </style>
</head>
<body>
  <main class="card">
    <div class="pill">β版・テスト中 ／ アカウントなし版</div>
    <div class="logo-line">
      <div class="logo-mark">✈️</div>
      <div>
        <h1>ニコリタウン</h1>
        <p class="lead">ルーム名を入力するだけで、同じルームの人と歩き回って話せる2Dタウン。</p>
      </div>
    </div>

    <section class="screen">
      <div class="grid two">
        <label>ルーム名
          <input id="roomName" maxlength="32" placeholder="例）park-001" autocomplete="off" />
        </label>
        <label>表示名（空ならゲスト）
          <input id="playerName" maxlength="16" placeholder="例）こっぴー" autocomplete="off" />
        </label>
      </div>

      <div id="skinPicker" class="skin-picker" aria-label="スキン変更">
        <div class="skin-picker-title">スキン変更</div>
        <div class="skin-choice-row">
          <button type="button" class="skin-choice" data-skin="nikorihito" aria-pressed="false">
            <img src="./nikorihito_dot_front.png" alt="" />
            <span>ニコリヒト</span>
          </button>
          <button type="button" class="skin-choice" data-skin="turuturu" aria-pressed="false">
            <img src="./turuturu_front.png" alt="" />
            <span>つるつる君</span>
          </button>
        </div>
        <div class="skin-picker-note">飛行機はどちらのスキンでも共通です。</div>
      </div>

      <div class="row right">
        <button id="enterRoomBtn">ルームに入る</button>
        <button id="randomRoomBtn" class="secondary">ランダム名</button>
      </div>
      <p class="notice">アカウント作成・ログイン・ルームパスワードは使いません。同じルーム名を入力した人が同じ部屋に入ります。</p>
      <div id="status" class="status"></div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js';
    import { getDatabase, ref, update } from 'https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js';

    const firebaseConfig = {
      apiKey: 'AIzaSyCy3P-HQhfd8-zpPUJ5YANxwRMuTCjFFAQ',
      authDomain: 'nikori-town.firebaseapp.com',
      databaseURL: 'https://nikori-town-default-rtdb.asia-southeast1.firebasedatabase.app',
      projectId: 'nikori-town',
      storageBucket: 'nikori-town.appspot.com',
      messagingSenderId: '836836010871',
      appId: '1:836836010871:web:74ae40cb16ee6d50368f72'
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app, firebaseConfig.databaseURL);
    const $ = id => document.getElementById(id);

    const LS_ROOM = 'nikoriTown.lastRoom';
    const LS_NAME = 'nikoriTown.playerName';
    const LS_SKIN = 'nikoriTown.skin';

    $('roomName').value = localStorage.getItem(LS_ROOM) || '';
    $('playerName').value = localStorage.getItem(LS_NAME) || '';

    function status(text){ $('status').textContent = text || ''; }

    function safeRoom(raw){
      return String(raw || '')
        .trim()
        .toLowerCase()
        .replace(/[.#$/\[\]\/]/g,'-')
        .replace(/[^\w\-ぁ-んァ-ヶ一-龠]/g,'-')
        .slice(0,32);
    }

    function safeName(raw){
      const name = String(raw || '').trim().slice(0,16);
      return name || 'ゲスト';
    }

    function normalizeSkin(raw){
      return raw === 'turuturu' ? 'turuturu' : 'nikorihito';
    }

    function getSelectedSkin(){
      return normalizeSkin(localStorage.getItem(LS_SKIN) || 'nikorihito');
    }

    function setSelectedSkin(skin){
      const value = normalizeSkin(skin);
      localStorage.setItem(LS_SKIN, value);
      document.querySelectorAll('[data-skin]').forEach(btn => {
        const active = btn.dataset.skin === value;
        btn.classList.toggle('active', active);
        btn.setAttribute('aria-pressed', String(active));
      });
    }

    function initSkinPicker(){
      document.querySelectorAll('[data-skin]').forEach(btn => {
        btn.onclick = () => setSelectedSkin(btn.dataset.skin);
      });
      setSelectedSkin(getSelectedSkin());
    }

    async function ensureAnonAuth(){
      if (auth.currentUser) return auth.currentUser;
      await signInAnonymously(auth);
      return await new Promise(resolve => {
        const stop = onAuthStateChanged(auth, user => {
          if (user) { stop(); resolve(user); }
        });
      });
    }

    async function enterRoom(){
      const room = safeRoom($('roomName').value);
      if (!room) {
        status('ルーム名を入力してください。');
        $('roomName').focus();
        return;
      }
      const name = safeName($('playerName').value);
      const skin = getSelectedSkin();
      localStorage.setItem(LS_ROOM, room);
      localStorage.setItem(LS_NAME, name);
      localStorage.setItem(LS_SKIN, skin);

      $('enterRoomBtn').disabled = true;
      status('ルームを準備しています...');
      try {
        const user = await ensureAnonAuth();
        await update(ref(db, `roomMeta/${room}`), {
          room,
          noAccountMode: true,
          passwordEnabled: false,
          updatedAt: Date.now(),
          lastJoinUid: user.uid
        });
        const u = new URL('./room.html', location.href);
        u.searchParams.set('room', room);
        u.searchParams.set('name', name);
        u.searchParams.set('skin', skin);
        location.href = u.toString();
      } catch (error) {
        console.error(error);
        status('入室準備に失敗しました。Firebaseの設定またはDBルールを確認してください。');
        $('enterRoomBtn').disabled = false;
      }
    }

    $('enterRoomBtn').onclick = enterRoom;
    $('roomName').addEventListener('keydown', e => { if (e.key === 'Enter') enterRoom(); });
    $('playerName').addEventListener('keydown', e => { if (e.key === 'Enter') enterRoom(); });
    $('randomRoomBtn').onclick = () => {
      $('roomName').value = 'room-' + Math.random().toString(36).slice(2,7);
      $('roomName').focus();
    };

    initSkinPicker();
  </script>
</body>
</html>
