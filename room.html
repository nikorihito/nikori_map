<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>ニコリタウン - ルーム</title>
<style>
  :root{
    --bg:#0b1220;
    --panel:#0f172a;
    --panel2:#101826;
    --border:#334155;
    --text:#e2e8f0;
    --muted:#9aa6b2;
    --a1:#22d3ee;
    --a2:#06b6d4;
    --danger:#ef4444;
    --yellow:#fde68a33;
    --yellowBorder:#facc15;
    --mention:#22d3ee;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;
    overflow:hidden;
    touch-action:none;
  }
  button,input{font:inherit}
  button{cursor:pointer}
  #game{
    display:block;
    width:100vw;
    height:100vh;
    image-rendering:pixelated;
    background:#0b1220;
  }

  /* HUD */
  .hud{
    position:fixed;
    left:8px;
    top:8px;
    z-index:20;
    display:flex;
    gap:8px;
    align-items:center;
    flex-wrap:wrap;
  }
  .hud .info{
    background:rgba(16,24,38,.88);
    border:1px solid var(--border);
    padding:6px 10px;
    border-radius:10px;
    backdrop-filter:blur(6px);
    white-space:nowrap;
  }
  .hud button,
  #composer button,
  #flyBtn{
    padding:8px 10px;
    border-radius:10px;
    border:1px solid var(--border);
    background:linear-gradient(180deg,var(--a1),var(--a2));
    color:#06202a;
    font-weight:700;
  }
  #leaveBtn{background:linear-gradient(180deg,var(--a1),var(--a2));color:#06202a}
  #copyRoomBtn{background:linear-gradient(180deg,var(--a1),var(--a2));color:#06202a}

  /* AV buttons */
  .avbar{
    position:fixed;
    left:8px;
    top:56px;
    z-index:30;
    display:flex;
    gap:8px;
  }
  .avbar button{
    min-width:48px;
    padding:9px 10px;
    border-radius:12px;
    border:1px solid var(--border);
    background:#101826;
    color:#e2e8f0;
    box-shadow:0 8px 22px rgba(0,0,0,.22);
  }
  .avbar button.on{
    background:linear-gradient(180deg,var(--a1),var(--a2));
    color:#06202a;
    font-weight:800;
  }
  .avbar button.danger{background:#2a1111;color:#fecaca;border-color:#7f1d1d}
  .avbar button:disabled{opacity:.55;cursor:not-allowed}

  .avmenu{
    position:fixed;
    z-index:51;
    display:none;
    background:#101826;
    border:1px solid var(--border);
    border-radius:12px;
    padding:8px;
    min-width:220px;
    box-shadow:0 14px 40px rgba(0,0,0,.45);
  }
  .avmenu .line{font-size:.9rem;color:var(--muted);padding:4px 6px}

  .avmenu .groupTitle{
    font-weight:800;
    color:#e2e8f0;
    padding:4px 6px 7px;
  }
  .avmenu button,
  .avmenu select{
    width:100%;
    margin:4px 0;
    padding:8px 10px;
    border-radius:10px;
    border:1px solid var(--border);
    background:#0b1220;
    color:#e2e8f0;
  }
  .avmenu button.primary{
    background:linear-gradient(180deg,var(--a1),var(--a2));
    color:#06202a;
    font-weight:800;
  }
  .avmenu select{outline:none}

  #audioUnlock{
    position:fixed;
    left:50%;
    bottom:78px;
    transform:translateX(-50%);
    z-index:35;
    display:none;
    padding:10px 14px;
    border-radius:999px;
    border:1px solid var(--border);
    background:rgba(16,24,38,.95);
    color:#e2e8f0;
    box-shadow:0 12px 34px rgba(0,0,0,.35);
  }

  #avGrid{
    position:fixed;
    left:8px;
    bottom:8px;
    z-index:22;
    display:flex;
    gap:8px;
    max-width:calc(100vw - 16px);
    overflow-x:auto;
    pointer-events:auto;
  }
  .avCard{
    width:168px;
    min-width:168px;
    height:112px;
    background:rgba(16,24,38,.92);
    border:1px solid var(--border);
    border-radius:12px;
    overflow:hidden;
    position:relative;
    box-shadow:0 10px 26px rgba(0,0,0,.32);
  }
  .avCard.speaking{border-color:var(--a1);box-shadow:0 0 0 2px rgba(34,211,238,.24),0 10px 26px rgba(0,0,0,.32)}
  .avCard video{
    width:100%;
    height:100%;
    object-fit:cover;
    background:#020617;
  }
  .avCard .audioOnly{
    height:100%;
    display:grid;
    place-items:center;
    font-size:32px;
    background:radial-gradient(circle at center,#1e293b,#020617);
  }
  .avCard .label{
    position:absolute;
    left:0;
    right:0;
    bottom:0;
    padding:4px 7px;
    font-size:.78rem;
    background:linear-gradient(transparent,rgba(0,0,0,.72));
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .avCard .badges{
    position:absolute;
    top:5px;
    right:5px;
    display:flex;
    gap:4px;
  }
  .badge{
    font-size:.72rem;
    padding:2px 5px;
    border-radius:999px;
    background:rgba(15,23,42,.82);
    border:1px solid rgba(148,163,184,.35);
  }

  #avBackdrop{
    position:fixed;
    inset:0;
    z-index:70;
    display:none;
    background:rgba(2,6,23,.62);
    backdrop-filter:blur(3px);
  }
  .avCard.expandable{cursor:zoom-in}
  .avCard.expanded{
    position:fixed;
    left:50%;
    top:50%;
    z-index:81;
    width:min(92vw,980px);
    min-width:0;
    height:min(72vh,560px);
    transform:translate(-50%,-50%);
    cursor:zoom-out;
    border-color:var(--a1);
    box-shadow:0 0 0 2px rgba(34,211,238,.30),0 24px 80px rgba(0,0,0,.62);
  }
  .avCard.expanded video{object-fit:contain}
  .mobileOnly{display:none}

  /* Chat */
  #chatView{
    position:fixed;
    right:8px;
    top:8px;
    z-index:20;
    width:min(36vw,520px);
    max-height:55vh;
    overflow:auto;
    background:rgba(16,24,38,.85);
    backdrop-filter:blur(6px);
    border:1px solid var(--border);
    border-radius:12px;
    padding:8px;
  }
  #chatView .item{
    padding:7px 8px;
    border-radius:9px;
    margin:6px 0;
    position:relative;
    word-break:break-word;
  }
  #chatView .me{background:rgba(34,211,238,.12)}
  #chatView .replyTo{
    display:block;
    font-size:.85rem;
    color:var(--muted);
    background:rgba(148,163,184,.12);
    padding:4px 6px;
    border-left:3px solid #64748b;
    border-radius:6px;
    margin-bottom:4px;
    cursor:pointer;
  }
  #chatView .replyToMe{
    background:var(--yellow);
    border:1px solid var(--yellowBorder);
  }
  .mentionSelf{color:var(--mention);font-weight:800}
  .nameLine{font-weight:800;margin-bottom:2px;color:#bfdbfe}
  .meta{color:var(--muted);font-size:.78rem;margin-top:3px}

  #composer{
    position:fixed;
    left:50%;
    bottom:8px;
    transform:translateX(-50%);
    z-index:24;
    display:flex;
    gap:6px;
    background:var(--panel2);
    border:1px solid var(--border);
    border-radius:12px;
    padding:6px;
    box-shadow:0 10px 28px rgba(0,0,0,.35);
  }
  #composer input{
    width:min(60vw,720px);
    padding:10px 12px;
    border:1px solid var(--border);
    border-radius:10px;
    background:#0b1220;
    color:#e2e8f0;
    outline:none;
  }
  #composer input:focus{border-color:var(--a1);box-shadow:0 0 0 2px rgba(34,211,238,.18)}

  #ctxMenu{
    position:fixed;
    z-index:50;
    display:none;
    background:#101826;
    border:1px solid var(--border);
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 14px 40px rgba(0,0,0,.45);
  }
  #ctxMenu button{
    display:block;
    width:210px;
    text-align:left;
    padding:10px 12px;
    background:transparent;
    border:0;
    color:#e2e8f0;
  }
  #ctxMenu button:hover{background:#1b2540}

  /* Reaction */
  #reactFab{
    position:fixed;
    right:16px;
    bottom:96px;
    z-index:24;
    width:56px;
    height:56px;
    border-radius:50%;
    display:grid;
    place-items:center;
    font-size:22px;
    border:1px solid var(--border);
    background:linear-gradient(180deg,var(--a1),var(--a2));
    color:#06202a;
    box-shadow:0 8px 22px rgba(0,0,0,.35);
  }
  #reactMenu{
    position:fixed;
    right:16px;
    bottom:160px;
    z-index:25;
    display:none;
    background:#101826;
    border:1px solid var(--border);
    border-radius:12px;
    padding:6px;
    box-shadow:0 12px 34px rgba(0,0,0,.35);
  }
  #reactMenu button{
    font-size:22px;
    line-height:1.2;
    padding:6px 8px;
    background:transparent;
    border:0;
  }
  .bubble{
    position:absolute;
    transform:translate(-50%,-100%);
    background:#101826;
    border:1px solid var(--border);
    border-radius:12px;
    padding:6px 10px;
    font-size:20px;
    pointer-events:none;
    z-index:19;
  }

  /* Flight */
  #flyBtn{
    position:fixed;
    left:16px;
    bottom:122px;
    z-index:23;
    width:56px;
    height:56px;
    border-radius:50%;
    display:grid;
    place-items:center;
    font-size:22px;
    border:1px solid var(--border);
    background:linear-gradient(180deg,#64748b,#334155);
    color:#e2e8f0;
    box-shadow:0 8px 22px rgba(0,0,0,.35);
  }
  #flyBtn.on{
    background:linear-gradient(180deg,var(--a1),var(--a2));
    color:#06202a;
    font-weight:800;
  }

  /* Joystick (mobile) */
  #joyBase{
    position:fixed;
    left:16px;
    bottom:190px;
    z-index:23;
    width:108px;
    height:108px;
    border-radius:50%;
    border:1px solid var(--border);
    background:rgba(15,23,42,.6);
    display:none;
    touch-action:none;
  }
  #joyStick{
    position:absolute;
    left:50%;
    top:50%;
    width:52px;
    height:52px;
    border-radius:50%;
    transform:translate(-50%,-50%);
    border:1px solid var(--border);
    background:linear-gradient(180deg,var(--a1),var(--a2));
  }

  #toast{
    position:fixed;
    left:50%;
    top:16px;
    transform:translateX(-50%);
    z-index:90;
    display:none;
    max-width:min(92vw,720px);
    padding:10px 14px;
    border-radius:12px;
    border:1px solid var(--border);
    background:rgba(16,24,38,.95);
    color:#e2e8f0;
    box-shadow:0 14px 40px rgba(0,0,0,.45);
  }

  @media (pointer:coarse), (max-width:820px){
    .mobileOnly{
      display:grid;
      place-items:center;
      position:fixed;
      z-index:26;
      border:1px solid var(--border);
      background:linear-gradient(180deg,var(--a1),var(--a2));
      color:#06202a;
      font-weight:800;
      box-shadow:0 8px 22px rgba(0,0,0,.35);
    }
    .hud{
      left:6px;
      right:6px;
      top:6px;
      gap:5px;
      flex-wrap:nowrap;
    }
    .hud .info{
      flex:1;
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      font-size:12px;
      padding:6px 8px;
    }
    .hud button{
      padding:7px 8px;
      font-size:12px;
      border-radius:9px;
      white-space:nowrap;
    }
    .avbar{
      left:6px;
      top:52px;
      gap:6px;
    }
    .avbar button{
      width:42px;
      min-width:42px;
      height:42px;
      padding:0;
      border-radius:12px;
      font-size:20px;
    }
    #avPanelToggle{
      left:144px;
      top:52px;
      width:56px;
      height:42px;
      border-radius:12px;
      font-size:12px;
    }
    #chatToggleBtn{
      right:16px;
      bottom:96px;
      width:52px;
      height:52px;
      border-radius:50%;
      font-size:22px;
    }
    #reactFab{
      right:16px;
      bottom:156px;
      width:52px;
      height:52px;
    }
    #reactMenu{right:16px;bottom:214px}
    #flyBtn{
      left:16px;
      bottom:132px;
      width:54px;
      height:54px;
    }
    #joyBase{
      display:block;
      left:14px;
      bottom:196px;
      width:104px;
      height:104px;
    }
    #chatView{
      display:none;
      left:8px;
      right:8px;
      top:102px;
      width:auto;
      max-height:42vh;
      z-index:31;
    }
    body.chatOpen #chatView{display:block}
    #composer{
      display:none;
      left:8px;
      right:8px;
      bottom:8px;
      width:auto;
      transform:none;
      z-index:32;
    }
    body.chatOpen #composer{display:flex}
    #composer input{width:100%;min-width:0}
    #avGrid{
      display:none;
      left:8px;
      right:8px;
      bottom:8px;
      max-width:none;
      padding-bottom:2px;
      z-index:29;
    }
    body.avOpen #avGrid{display:flex}
    body.chatOpen #avGrid{display:none}
    .avCard{
      width:148px;
      min-width:148px;
      height:96px;
    }
    .avCard.expanded{
      width:94vw;
      height:62vh;
    }
    .avmenu{
      left:8px!important;
      right:8px;
      top:98px!important;
      min-width:0;
      max-width:none;
    }
    #audioUnlock{bottom:72px;max-width:90vw;text-align:center}
  }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div class="hud">
  <button id="leaveBtn">退室</button>
  <div class="info">ルーム: <span id="roomId">-</span> ／ 自分: <span id="who">-</span> ／ 人数: <span id="count">0</span></div>
  <button id="copyRoomBtn" title="このルームのURLをコピー">コピー</button>
</div>

<div class="avbar" aria-label="通話操作">
  <button id="btnMic" title="マイク（右クリックで設定）">🎙️</button>
  <button id="btnCam" title="カメラ（右クリックで設定）">📷</button>
  <button id="btnScreen" title="画面共有（右クリックで設定）">🖥️</button>
</div>
<button id="avPanelToggle" class="mobileOnly" title="通話画面を表示・非表示">通話</button>

<div id="chatView" aria-label="チャット"></div>
<div id="composer">
  <input id="text" maxlength="2000" placeholder="メッセージを入力。Enterで送信 / @名前 でメンション" autocomplete="off" />
  <button id="send">送信</button>
</div>

<div id="ctxMenu">
  <button id="ctxReply">返信</button>
  <button id="ctxReactOpen">リアクション</button>
  <button id="editMsg">編集</button>
  <button id="delMsg">削除</button>
</div>

<button id="reactFab" title="リアクション">😊</button>
<button id="chatToggleBtn" class="mobileOnly" title="チャットを表示・非表示">💬</button>
<div id="reactMenu"></div>

<button id="flyBtn" title="フライト（↓ + H）">✈️</button>
<div id="joyBase"><div id="joyStick"></div></div>

<div id="avBackdrop"></div>
<div id="avGrid"></div>
<div id="avMenu" class="avmenu"></div>
<div id="audioUnlock">クリックして音声を有効化</div>
<div id="toast"></div>

<script type="module">
/* ===== Params ===== */
const SCALE = 6;
const SPEED_PPS = 320;
const RADIUS = 10;
const PLAYER_INTERP = 12;
const CAM_INTERP = 10;
const SYNC_MS = 50;
const MAX_MSG = 120;
const FRAME_MIN = 1000 / 50;
const FLY_SPEED_PPS = SPEED_PPS * 2.2;
const PLANE_MIN_SIZE = 190;
const PLANE_SCALE = 4.6;
const EMOJIS = ['👍','❤️','🎉','👏','😂','😮','🙌','🔥'];
const RTC_CONFIG = { iceServers:[{urls:'stun:stun.l.google.com:19302'}] };

/* ===== Firebase ===== */
import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js';
import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js';
import {
  getDatabase, ref, onDisconnect, set, update, remove, onValue,
  push, limitToLast, query, onChildAdded, onChildChanged, onChildRemoved
} from 'https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js';

const firebaseConfig = {
  apiKey:'AIzaSyCy3P-HQhfd8-zpPUJ5YANxwRMuTCjFFAQ',
  authDomain:'nikori-town.firebaseapp.com',
  databaseURL:'https://nikori-town-default-rtdb.asia-southeast1.firebasedatabase.app',
  projectId:'nikori-town',
  storageBucket:'nikori-town.appspot.com',
  messagingSenderId:'836836010871',
  appId:'1:836836010871:web:74ae40cb16ee6d50368f72'
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app, firebaseConfig.databaseURL);

/* ===== DOM ===== */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const roomIdEl = document.getElementById('roomId');
const whoEl = document.getElementById('who');
const countEl = document.getElementById('count');
const leaveBtn = document.getElementById('leaveBtn');
const copyRoomBtn = document.getElementById('copyRoomBtn');
const btnMic = document.getElementById('btnMic');
const btnCam = document.getElementById('btnCam');
const btnScreen = document.getElementById('btnScreen');
const avPanelToggle = document.getElementById('avPanelToggle');
const avGrid = document.getElementById('avGrid');
const avBackdrop = document.getElementById('avBackdrop');
const avMenu = document.getElementById('avMenu');
const audioUnlock = document.getElementById('audioUnlock');
const toastEl = document.getElementById('toast');
const chatView = document.getElementById('chatView');
const textEl = document.getElementById('text');
const sendBtn = document.getElementById('send');
const ctxMenu = document.getElementById('ctxMenu');
const reactFab = document.getElementById('reactFab');
const chatToggleBtn = document.getElementById('chatToggleBtn');
const reactMenu = document.getElementById('reactMenu');
const flyBtn = document.getElementById('flyBtn');
const joyBase = document.getElementById('joyBase');
const joyStick = document.getElementById('joyStick');

/* ===== Utilities ===== */
function showToast(message, ms=2800){
  toastEl.textContent = message;
  toastEl.style.display = 'block';
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>toastEl.style.display='none', ms);
}
function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
function now(){ return Date.now(); }
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
async function ensureAnonAuth(auth){
  if (auth.currentUser) return auth.currentUser;
  await signInAnonymously(auth);
  return await new Promise(resolve=>{
    const stop = onAuthStateChanged(auth, u => {
      if(u){ stop(); resolve(u); }
    });
  });
}
function loadImage(src, {fallbackSize=[2048,2048], label='asset'}={}){
  return new Promise(res=>{
    const img = new Image();
    img.onload = ()=>res(img);
    img.onerror = ()=>{
      console.error('Image load failed:', src);
      const c = document.createElement('canvas');
      c.width = fallbackSize[0];
      c.height = fallbackSize[1];
      const g = c.getContext('2d');
      g.fillStyle = '#0f172a';
      g.fillRect(0,0,c.width,c.height);
      g.fillStyle = '#94a3b8';
      g.font = '24px system-ui';
      g.fillText(label,20,42);
      const fallback = new Image();
      fallback.onload = ()=>res(fallback);
      fallback.src = c.toDataURL('image/png');
    };
    img.src = src;
  });
}
function safeKey(s){ return String(s||'').trim().toLowerCase().replace(/[.#$/\[\]\/]/g,'-').slice(0,32) || 'room-001'; }
function safeName(s){ return String(s||'guest').trim().slice(0,24) || 'guest'; }

/* ===== URL ===== */
const url = new URL(location.href);
const ROOM = safeKey(url.searchParams.get('room') || 'room-001');
const NAME = safeName(url.searchParams.get('name') || 'guest');
roomIdEl.textContent = ROOM;
whoEl.textContent = NAME;

copyRoomBtn.onclick = async()=>{
  const shareUrl = new URL(location.href);
  shareUrl.searchParams.set('room', ROOM);
  shareUrl.searchParams.delete('name');
  const text = shareUrl.href;
  try{
    await navigator.clipboard.writeText(text);
    showToast('ルームURLをコピーしました');
  }catch{
    prompt('このURLをコピーしてください', text);
  }
};
chatToggleBtn?.addEventListener('click', ()=>{
  document.body.classList.toggle('chatOpen');
});
avPanelToggle?.addEventListener('click', ()=>{
  document.body.classList.toggle('avOpen');
});

/* ===== Assets ===== */
const imgMap = await loadImage('./map_1.png?v=20250927-2', {fallbackSize:[2048,2048], label:'map'});
const imgMask = await loadImage('./atarihantei.png?v=20250927-2', {fallbackSize:[2048,2048], label:'mask'});

const world = {w:imgMap.width, h:imgMap.height};

const maskCanvas = (typeof OffscreenCanvas !== 'undefined')
  ? new OffscreenCanvas(imgMask.width,imgMask.height)
  : Object.assign(document.createElement('canvas'), {width:imgMask.width, height:imgMask.height});
const mctx = maskCanvas.getContext('2d');
mctx.drawImage(imgMask,0,0);
const mdata = mctx.getImageData(0,0,imgMask.width,imgMask.height);
const mpix = mdata.data;
const MW = imgMask.width;
function isBlocked(x,y){
  x = x|0; y = y|0;
  if(x<0||y<0||x>=world.w||y>=world.h) return true;
  const i = (y*MW+x)*4;
  const r = mpix[i], g = mpix[i+1], b = mpix[i+2], a = mpix[i+3];
  if(a < 10) return false;
  return (r >= 180 && g <= 80 && b <= 80);
}
function hits(x,y){
  const foot = y + RADIUS * 0.6;
  return isBlocked(x,foot) || isBlocked(x-RADIUS*0.7,foot) || isBlocked(x+RADIUS*0.7,foot);
}
function safeSpawn(maxTry=500){
  for(let i=0;i<maxTry;i++){
    const x = Math.random()*(world.w-64)+32;
    const y = Math.random()*(world.h-64)+32;
    if(!hits(x,y)) return {x,y};
  }
  return {x:world.w/2, y:world.h/2};
}

/* ===== Active speaker meter ===== */
let audioCtx = null;
const meters = new Map();
const speakUntil = new Map();
const SPEAK_THR = 0.055;
const SPEAK_HOLD = 330;
function ensureAudioCtx(){
  if(!audioCtx && (window.AudioContext || window.webkitAudioContext)){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if(audioCtx?.state === 'suspended') audioCtx.resume().catch(()=>{});
}
function attachSpeechMeter(id, stream){
  ensureAudioCtx();
  if(!audioCtx || !stream || !stream.getAudioTracks().length) return;
  detachSpeechMeter(id);
  try{
    const src = audioCtx.createMediaStreamSource(stream);
    const analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    src.connect(analyser);
    const data = new Uint8Array(analyser.frequencyBinCount);
    let raf = 0;
    const loop = ()=>{
      analyser.getByteTimeDomainData(data);
      let sum = 0;
      for(let i=0;i<data.length;i++){
        const v = (data[i]-128)/128;
        sum += v*v;
      }
      if(Math.sqrt(sum/data.length) > SPEAK_THR) speakUntil.set(id, performance.now()+SPEAK_HOLD);
      raf = requestAnimationFrame(loop);
    };
    loop();
    meters.set(id, ()=>{ try{src.disconnect();}catch{} cancelAnimationFrame(raf); });
  }catch(err){ console.warn(err); }
}
function detachSpeechMeter(id){
  const stop = meters.get(id);
  if(stop) stop();
  meters.delete(id);
  speakUntil.delete(id);
}
function isSpeaking(id){ return (speakUntil.get(id)||0) > performance.now(); }

async function requestMedia(kind){
  if(!navigator.mediaDevices){
    showToast('このブラウザではメディア機能が使えません');
    return null;
  }
  try{
    if(kind === 'mic'){
      const audio = selectedMicId
        ? {deviceId:{exact:selectedMicId}, echoCancellation:true, noiseSuppression:true, autoGainControl:true}
        : {echoCancellation:true, noiseSuppression:true, autoGainControl:true};
      return await navigator.mediaDevices.getUserMedia({audio, video:false});
    }
    if(kind === 'cam'){
      const video = selectedCamId
        ? {deviceId:{exact:selectedCamId}, width:{ideal:960}, height:{ideal:540}}
        : {width:{ideal:960}, height:{ideal:540}};
      return await navigator.mediaDevices.getUserMedia({audio:false, video});
    }
    if(kind === 'screen') return await navigator.mediaDevices.getDisplayMedia({video:true, audio:false});
  }catch(err){
    console.warn(err);
    showToast('許可がキャンセルされたか、端末で利用できません');
    return null;
  }
}

  ensureAudioCtx();

  if(on) micStream = await requestMedia('mic');
  updateAvButtons();
  await syncAllSendersAndNegotiate();
}
async function setCamEnabled(on){
  if(camStream){ stopStream(camStream); camStream = null; }

async function setScreenEnabled(on){
  if(screenStream){ stopStream(screenStream); screenStream = null; }
  if(on){
    screenStream = await requestMedia('screen');
    const track = screenStream?.getVideoTracks()[0];
    if(track) track.onended = async()=>{
      screenStream = null;
      updateAvButtons();
      await syncAllSendersAndNegotiate();
    };
  }
  updateAvButtons();
  await syncAllSendersAndNegotiate();
}

function otherPlayerIds(){ return Object.keys(players).filter(id=>id !== meId); }
function connectToKnownPeers(){
  for(const id of otherPlayerIds()) ensurePeer(id);
}
function ensurePeer(peerId){
  if(peerId === meId) return null;
  let st = peerStates.get(peerId);
  if(st) return st;

  const pc = new RTCPeerConnection(RTC_CONFIG);
  const polite = meId > peerId;
  const remote = {audio:new MediaStream(), videos:[]};
  st = {pc, polite, makingOffer:false, ignoreOffer:false, senders:{audio:null, cam:null, screen:null}, remote};
  peerStates.set(peerId, st);
  remoteStreams.set(peerId, remote);

  pc.onicecandidate = e=>{
    if(e.candidate) sendSignal(peerId, {type:'ice', candidate:e.candidate.toJSON()});
  };
  pc.ontrack = e=>{
    if(e.track.kind === 'audio'){
      if(!remote.audio.getTracks().some(t=>t.id === e.track.id)) remote.audio.addTrack(e.track);
      attachSpeechMeter(peerId, remote.audio);
    }else if(e.track.kind === 'video'){
      if(!remote.videos.some(t=>t.id === e.track.id)) remote.videos.push(e.track);
    }
    e.track.onended = ()=>{
      if(e.track.kind === 'video') remote.videos = remote.videos.filter(t=>t.id !== e.track.id);
      renderAvGrid();
    };
    e.track.onmute = ()=>renderAvGrid();
    e.track.onunmute = ()=>renderAvGrid();
    renderAvGrid();
  };
  pc.onconnectionstatechange = ()=>{
    if(['failed','closed','disconnected'].includes(pc.connectionState)){
      if(pc.connectionState === 'failed') pc.restartIce?.();
      if(pc.connectionState === 'closed') closePeer(peerId);
    }
  };
  pc.onnegotiationneeded = ()=>negotiate(peerId).catch(console.warn);
  syncSenders(peerId).catch(console.warn);
  return st;
}
function closePeer(peerId){
  const st = peerStates.get(peerId);
  if(!st) return;
  try{ st.pc.close(); }catch{}
  peerStates.delete(peerId);
  remoteStreams.delete(peerId);
  detachSpeechMeter(peerId);
  renderAvGrid();
}
async function sendSignal(to, payload){
  await push(ref(db, `rooms/${ROOM}/rtc/${to}`), Object.assign({from:meId, ts:now()}, payload));
}
async function syncSender(pc, st, key, track, stream){
  if(track){
    if(st.senders[key]) await st.senders[key].replaceTrack(track);
    else st.senders[key] = pc.addTrack(track, stream);
  }else if(st.senders[key]){
    await st.senders[key].replaceTrack(null);
  }
}
async function syncSenders(peerId){
  const st = ensurePeer(peerId);
  if(!st) return;
  const pc = st.pc;
  const audioCamStream = getLocalCameraStream();
  const screenOnlyStream = getLocalScreenStream();
  await syncSender(pc, st, 'audio', getAudioTrack(), audioCamStream);
  await syncSender(pc, st, 'cam', getCamTrack(), audioCamStream);
  await syncSender(pc, st, 'screen', getScreenTrack(), screenOnlyStream);
}
async function syncAllSendersAndNegotiate(){
  connectToKnownPeers();
  for(const id of otherPlayerIds()){
    await syncSenders(id);
    await negotiate(id).catch(console.warn);
  }
}
async function negotiate(peerId){
  const st = ensurePeer(peerId);
  if(!st || st.makingOffer || st.pc.signalingState !== 'stable') return;
  try{
    st.makingOffer = true;
    await st.pc.setLocalDescription(await st.pc.createOffer());
    await sendSignal(peerId, {type:'offer', description:st.pc.localDescription.toJSON()});
  }finally{
    st.makingOffer = false;
  }
}
async function handleSignal(msgKey, msg){
  const from = msg?.from;
  if(!from || from === meId) return;
  const st = ensurePeer(from);
  const pc = st.pc;
  try{
    if(msg.type === 'offer' || msg.type === 'answer'){
      const desc = new RTCSessionDescription(msg.description);
      const offerCollision = desc.type === 'offer' && (st.makingOffer || pc.signalingState !== 'stable');
      st.ignoreOffer = !st.polite && offerCollision;
      if(st.ignoreOffer) return;
      await pc.setRemoteDescription(desc);
      if(desc.type === 'offer'){
        await syncSenders(from);
        await pc.setLocalDescription(await pc.createAnswer());
        await sendSignal(from, {type:'answer', description:pc.localDescription.toJSON()});
      }
    }else if(msg.type === 'ice' && msg.candidate){
      try{ await pc.addIceCandidate(new RTCIceCandidate(msg.candidate)); }
      catch(err){ if(!st.ignoreOffer) throw err; }
    }
  }catch(err){
    console.warn('RTC signal error', err);
  }finally{
    remove(ref(db, `rooms/${ROOM}/rtc/${meId}/${msgKey}`)).catch(()=>{});
  }
}
onChildAdded(rtcInboxRef, snap=>handleSignal(snap.key, snap.val()));

function activeVideos(remote){
  return (remote?.videos || []).filter(t=>t.readyState === 'live' && !t.muted);
}
function renderAvGrid(){
  avGrid.innerHTML = '';

  const localCamera = getLocalCameraStream();
  if(localCamera.getTracks().length){
    avGrid.appendChild(makeAvCard('self-camera', meId, NAME + '（自分）', localCamera, true, {mic:!!getAudioTrack(), cam:!!getCamTrack()}, 'camera', false));
  }
  const localScreen = getLocalScreenStream();
  if(localScreen.getTracks().length){
    avGrid.appendChild(makeAvCard('self-screen', meId, NAME + '（画面共有）', localScreen, true, {screen:true}, 'screen', false));
  }

  for(const [id,remote] of remoteStreams){
    const p = players[id] || ghosts[id] || {};
    const av = p.av || {};
    const videos = activeVideos(remote);
    const audioTracks = remote.audio.getAudioTracks().filter(liveTrack);
    const camTrack = av.cam ? videos[0] : null;
    const screenTrack = av.screen ? videos[av.cam ? 1 : 0] : null;

    if(av.mic || av.cam || audioTracks.length || camTrack){
      const s = streamFromTracks([...audioTracks, camTrack]);
      avGrid.appendChild(makeAvCard(`${id}-camera`, id, p.name || 'guest', s, false, {mic:!!av.mic, cam:!!av.cam}, 'camera', !!camTrack));
    }
    if(av.screen || screenTrack){
      const s = streamFromTracks([screenTrack]);
      avGrid.appendChild(makeAvCard(`${id}-screen`, id, `${p.name || 'guest'}（画面共有）`, s, false, {screen:true}, 'screen', !!screenTrack));
    }
  }
  avBackdrop.style.display = expandedAvKey ? 'block' : 'none';
}
function makeAvCard(cardKey, id, name, stream, muted, av={}, type='camera', expandable=false){
  const card = document.createElement('div');
  card.className = 'avCard' + (isSpeaking(id) ? ' speaking':'') + (expandable ? ' expandable':'') + (expandedAvKey === cardKey ? ' expanded':'');
  card.dataset.avKey = cardKey;
  const videoTrack = stream.getVideoTracks().find(t=>t.readyState === 'live');
  if(videoTrack){
    const video = document.createElement('video');
    video.autoplay = true;
    video.playsInline = true;
    video.muted = muted;
    video.srcObject = stream;
    video.play?.().catch(()=>{ if(!muted) audioUnlock.style.display='block'; });
    card.appendChild(video);
  }else{
    const audioOnly = document.createElement('div');
    audioOnly.className = 'audioOnly';
    audioOnly.textContent = type === 'screen' ? '🖥️' : '🎧';
    card.appendChild(audioOnly);
    if(stream.getAudioTracks().length){
      const audio = document.createElement('audio');
      audio.autoplay = true;
      audio.muted = muted;
      audio.srcObject = stream;
      audio.play?.().catch(()=>{ if(!muted) audioUnlock.style.display='block'; });
      card.appendChild(audio);
    }
  }
  if(expandable){
    card.onclick = ()=>{
      expandedAvKey = expandedAvKey === cardKey ? null : cardKey;
      renderAvGrid();
    };
  }
  const badges = document.createElement('div');
  badges.className = 'badges';
  if(av.mic) badges.appendChild(makeBadge('🎙'));
  if(av.cam) badges.appendChild(makeBadge('📷'));
  if(av.screen) badges.appendChild(makeBadge('🖥'));
  card.appendChild(badges);
  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = name;
  card.appendChild(label);
  return card;
}
function makeBadge(t){ const b=document.createElement('span'); b.className='badge'; b.textContent=t; return b; }
setInterval(renderAvGrid, 500);

/* ===== Movement ===== */
const keys = new Set();
let flightComboLocked = false;
addEventListener('keydown', e=>{
  if(['INPUT','TEXTAREA'].includes(document.activeElement?.tagName)) return;
  const k = e.key.toLowerCase();
  keys.add(k);
  if(keys.has('arrowdown') && keys.has('h') && !flightComboLocked){
    e.preventDefault();
    flightComboLocked = true;
    setFlight(!isFlying);
  }
});
addEventListener('keyup', e=>{
  keys.delete(e.key.toLowerCase());
  if(!keys.has('arrowdown') || !keys.has('h')) flightComboLocked = false;
});

let joy = {x:0,y:0,active:false};
function updateJoy(touch){
  const r = joyBase.getBoundingClientRect();
  const cx = r.left + r.width/2;
  const cy = r.top + r.height/2;
  const dx = touch.clientX - cx;
  const dy = touch.clientY - cy;
  const len = Math.hypot(dx,dy) || 1;
  const max = r.width * 0.34;
  joy.x = clamp(dx/max,-1,1);
  joy.y = clamp(dy/max,-1,1);
  const px = clamp(dx,-max,max);
  const py = clamp(dy,-max,max);
  joyStick.style.transform = `translate(calc(-50% + ${px}px), calc(-50% + ${py}px))`;
}
joyBase.addEventListener('touchstart', e=>{ joy.active=true; updateJoy(e.touches[0]); }, {passive:false});
joyBase.addEventListener('touchmove', e=>{ e.preventDefault(); updateJoy(e.touches[0]); }, {passive:false});
joyBase.addEventListener('touchend', ()=>{
  joy.active=false; joy.x=0; joy.y=0;
  joyStick.style.transform = 'translate(-50%,-50%)';
});

function setFlight(on){
  if(on === isFlying) return;
  if(!on && hits(my.x,my.y)){
    showToast('ここでは着地できません。赤い当たり判定の外に移動してください。');
    return;
  }
  isFlying = on;
  flyBtn.classList.toggle('on', isFlying);
  syncMe(true);
}
flyBtn.onclick = ()=>setFlight(!isFlying);

function move(dt){
  let dx = 0, dy = 0;
  if(keys.has('arrowleft') || keys.has('a')) dx -= 1;
  if(keys.has('arrowright') || keys.has('d')) dx += 1;
  if(keys.has('arrowup') || keys.has('w')) dy -= 1;
  if(keys.has('arrowdown') || keys.has('s')) dy += 1;
  if(joy.active){ dx += joy.x; dy += joy.y; }
  if(dx === 0 && dy === 0) return;
  const len = Math.hypot(dx,dy) || 1;
  dx /= len; dy /= len;
  if(Math.abs(dx) > Math.abs(dy)) my.dir = dx < 0 ? 'left' : 'right';
  else my.dir = dy < 0 ? 'back' : 'front';

  const speed = isFlying ? FLY_SPEED_PPS : SPEED_PPS;
  const nx = clamp(my.x + dx * speed * dt, 0, world.w-1);
  const ny = clamp(my.y + dy * speed * dt, 0, world.h-1);
  if(isFlying || !hits(nx,my.y)) my.x = nx;
  if(isFlying || !hits(my.x,ny)) my.y = ny;
  syncMe();
}

/* ===== Render ===== */
function spriteByDir(d){
  if(d === 'back') return {img:imgBack, flip:false};
  if(d === 'left') return {img:imgSide, flip:true};
  if(d === 'right') return {img:imgSide, flip:false};
  return {img:imgFront, flip:false};
}
let camX = 0, camY = 0;
function camera(dt){
  const tx = Math.round(my.x - canvas.width/2);
  const ty = Math.round(my.y - canvas.height/2);
  const k = Math.min(1, dt*CAM_INTERP);
  camX += (tx-camX)*k;
  camY += (ty-camY)*k;
  camX = clamp(camX,0,Math.max(0,world.w-canvas.width));
  camY = clamp(camY,0,Math.max(0,world.h-canvas.height));
  return {x:camX,y:camY};
}
function drawPlayer(p, id, cam){
  const sx = Math.round(p.x - cam.x);
  const sy = Math.round(p.y - cam.y);
  const fly = !!p.fly;
  let labelY;

  if(fly){
    const planeW = Math.max(PLANE_MIN_SIZE, imgPlane.width * PLANE_SCALE);
    const planeH = Math.max(PLANE_MIN_SIZE, imgPlane.height * PLANE_SCALE);
    drawImageCentered(imgPlane, sx, sy + 8, planeW, planeH, false, 1);
    labelY = sy + 8 - planeH / 2 - 16;
  }else{
    const sp = spriteByDir(p.dir || 'front');
    const w = sp.img.width * SCALE;
    const h = sp.img.height * SCALE;
    drawImageCentered(sp.img, sx, sy, w, h, sp.flip, 1);
    labelY = sy - h / 2 - 16;
  }

  const name = p.name || 'guest';
  const speaking = isSpeaking(id);
  ctx.save();
  ctx.font = speaking ? '800 14px system-ui' : '700 13px system-ui';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const textW = ctx.measureText(name).width;
  ctx.fillStyle = speaking ? 'rgba(34,211,238,.30)' : 'rgba(15,23,42,.72)';
  ctx.strokeStyle = speaking ? '#22d3ee' : 'rgba(148,163,184,.45)';
  ctx.lineWidth = speaking ? 2 : 1;
  roundRect(ctx, sx-textW/2-8, labelY-10, textW+16, 20, 8);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = '#e2e8f0';
  ctx.fillText(name, sx, labelY);
  ctx.restore();
}
function drawImageCentered(img,x,y,w,h,flip=false,alpha=1){
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x,y);
  if(flip) ctx.scale(-1,1);
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(img, -w/2, -h/2, w, h);
  ctx.restore();
}
function roundRect(g,x,y,w,h,r){
  g.beginPath();
  g.moveTo(x+r,y);
  g.arcTo(x+w,y,x+w,y+h,r);
  g.arcTo(x+w,y+h,x,y+h,r);
  g.arcTo(x,y+h,x,y,r);
  g.arcTo(x,y,x+w,y,r);
  g.closePath();
}
function updateBubbles(cam){
  for(const [uid, el] of bubbles){
    const p = uid === meId ? my : ghosts[uid];
    if(!p){ el.style.display='none'; continue; }
    el.style.left = `${p.x - cam.x}px`;
    el.style.top = `${p.y - cam.y - 72}px`;
  }
}
function interpolateGhosts(dt){
  const k = Math.min(1, dt*PLAYER_INTERP);
  for(const [id,g] of Object.entries(ghosts)){
    if(id === meId) continue;
    if(typeof g.tx === 'number') g.x += (g.tx-g.x)*k;
    if(typeof g.ty === 'number') g.y += (g.ty-g.y)*k;
  }
}
let last = performance.now();
let acc = 0;
function frame(t){
  const rawDt = Math.min(0.05, (t-last)/1000);
  last = t;
  acc += rawDt*1000;
  const dt = Math.max(rawDt, FRAME_MIN/1000);
  move(dt);
  interpolateGhosts(dt);

  const cam = camera(dt);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(imgMap, -Math.round(cam.x), -Math.round(cam.y));

  const drawList = [];
  for(const [id,g] of Object.entries(ghosts)){
    if(id !== meId) drawList.push([id,g]);
  }
  drawList.push([meId,my]);
  drawList.sort((a,b)=>(a[1].y||0)-(b[1].y||0));
  for(const [id,p] of drawList) drawPlayer(p,id,cam);
  updateBubbles(cam);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ===== Periodic maintenance ===== */
setInterval(()=>{
  syncMe(true);
  connectToKnownPeers();
}, 2500);
setInterval(()=>{
  const cutoff = now() - 15000;
  for(const [id,p] of Object.entries(players)){
    if(id !== meId && p.ts && p.ts < cutoff) closePeer(id);
  }
}, 5000);

updateAvButtons();
showToast('マイクボタンを押すと、このルーム内の相手とそのまま会話できます。', 3500);
</script>
