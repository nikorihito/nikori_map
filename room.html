<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
  <title>ニコリタウン - ルーム</title>
  <style>
    :root{
      --bg:#0b1220;
      --panel:#101826;
      --panel2:#0f172a;
      --border:#334155;
      --text:#e2e8f0;
      --muted:#94a3b8;
      --a1:#22d3ee;
      --a2:#06b6d4;
      --green:#22c55e;
      --danger:#ef4444;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;
      overflow:hidden;
      touch-action:none;
    }
    button,input{font:inherit}
    button{cursor:pointer}
    #game{display:block;width:100vw;height:100vh;image-rendering:pixelated;background:#0b1220}
    .hud{
      position:fixed;left:8px;top:8px;z-index:30;
      display:flex;gap:8px;align-items:center;flex-wrap:wrap;
    }
    .hud .info{
      background:rgba(16,24,38,.88);
      border:1px solid var(--border);
      padding:6px 10px;
      border-radius:10px;
      backdrop-filter:blur(6px);
      white-space:nowrap;
    }
    .hud button,.primaryBtn,#composer button,#flyBtn{
      padding:8px 10px;
      border-radius:10px;
      border:1px solid var(--border);
      background:linear-gradient(180deg,var(--a1),var(--a2));
      color:#06202a;
      font-weight:900;
    }
    .subBtn{background:#1e293b!important;color:#e2e8f0!important;border:1px solid var(--border)!important}
    #chatView{
      position:fixed;
      left:8px;
      bottom:72px;
      z-index:22;
      width:min(420px,calc(100vw - 16px));
      max-height:34vh;
      overflow:auto;
      display:flex;
      flex-direction:column;
      gap:6px;
      pointer-events:auto;
    }
    .chatItem{
      background:rgba(16,24,38,.86);
      border:1px solid rgba(148,163,184,.22);
      border-radius:12px;
      padding:8px 10px;
      box-shadow:0 8px 20px rgba(0,0,0,.24);
    }
    .chatItem.me{border-color:rgba(34,211,238,.36)}
    .nameLine{font-size:12px;color:#a5f3fc;font-weight:900;margin-bottom:3px}
    .meta{font-size:10px;color:var(--muted);margin-top:4px}
    #composer{
      position:fixed;
      left:8px;
      bottom:10px;
      z-index:24;
      width:min(520px,calc(100vw - 16px));
      display:flex;
      gap:8px;
    }
    #composer input{
      flex:1;
      min-width:0;
      border:1px solid var(--border);
      background:rgba(16,24,38,.92);
      color:var(--text);
      border-radius:12px;
      padding:10px 12px;
      outline:none;
    }
    #composer input:focus{border-color:var(--a1);box-shadow:0 0 0 3px rgba(34,211,238,.18)}
    #reactFab{
      position:fixed;
      right:16px;
      bottom:96px;
      z-index:30;
      width:56px;height:56px;border-radius:50%;
      display:grid;place-items:center;font-size:22px;
      border:1px solid var(--border);
      background:linear-gradient(180deg,var(--a1),var(--a2));
      color:#06202a;
      box-shadow:0 8px 22px rgba(0,0,0,.35);
    }
    #reactMenu{
      position:fixed;
      right:16px;
      bottom:160px;
      z-index:31;
      display:none;
      background:#101826;
      border:1px solid var(--border);
      border-radius:12px;
      padding:6px;
      box-shadow:0 12px 34px rgba(0,0,0,.35);
    }
    #reactMenu button{font-size:22px;line-height:1.2;padding:6px 8px;background:transparent;border:0}
    .bubble{
      position:absolute;
      transform:translate(-50%,-100%);
      background:#101826;
      border:1px solid var(--border);
      border-radius:12px;
      padding:6px 10px;
      font-size:20px;
      pointer-events:none;
      z-index:23;
    }
    #flyBtn{
      position:fixed;
      left:16px;
      bottom:122px;
      z-index:29;
      width:56px;height:56px;border-radius:50%;
      display:grid;place-items:center;font-size:22px;
      background:linear-gradient(180deg,#64748b,#334155);
      color:#e2e8f0;
      box-shadow:0 8px 22px rgba(0,0,0,.35);
    }
    #flyBtn.on{background:linear-gradient(180deg,var(--a1),var(--a2));color:#06202a}
    #joyBase{
      position:fixed;
      left:16px;
      bottom:190px;
      z-index:29;
      width:108px;height:108px;border-radius:50%;
      border:1px solid var(--border);
      background:rgba(15,23,42,.60);
      display:none;
      touch-action:none;
    }
    #joyStick{
      position:absolute;
      left:50%;top:50%;
      width:52px;height:52px;border-radius:50%;
      transform:translate(-50%,-50%);
      border:1px solid var(--border);
      background:linear-gradient(180deg,var(--a1),var(--a2));
    }
    #toast{
      position:fixed;
      left:50%;top:16px;
      transform:translateX(-50%);
      z-index:120;
      display:none;
      max-width:min(92vw,720px);
      padding:10px 14px;
      border-radius:12px;
      border:1px solid var(--border);
      background:rgba(16,24,38,.95);
      color:#e2e8f0;
      box-shadow:0 14px 40px rgba(0,0,0,.45);
    }
    .modalWrap{
      position:fixed;inset:0;z-index:110;
      display:none;align-items:center;justify-content:center;
      background:rgba(2,6,23,.68);
      backdrop-filter:blur(4px);
    }
    .modal{
      width:min(540px,92vw);
      background:#101826;
      border:1px solid var(--border);
      border-radius:18px;
      box-shadow:0 22px 80px rgba(0,0,0,.62);
      padding:18px;
    }
    .modal h2{margin:0 0 12px;font-size:18px}
    .modal p{color:var(--muted);line-height:1.7}
    .roomSkinPicker{
      margin:12px 0 14px;
      padding:12px;
      border-radius:16px;
      border:1px solid rgba(148,163,184,.22);
      background:rgba(15,23,42,.36);
    }
    .roomSkinTitle{font-weight:900;margin-bottom:8px}
    .roomSkinChoices{display:flex;gap:10px;flex-wrap:wrap}
    .roomSkinChoices button{
      display:flex;
      align-items:center;
      gap:8px;
      padding:9px 11px;
      border-radius:14px;
      border:1px solid rgba(148,163,184,.32);
      background:rgba(15,23,42,.62);
      color:#e5f3ff;
      font-weight:900;
    }
    .roomSkinChoices button img{width:34px;height:34px;object-fit:contain;image-rendering:pixelated}
    .roomSkinChoices button.active{
      border-color:rgba(34,211,238,.9);
      box-shadow:0 0 0 3px rgba(34,211,238,.18);
      background:linear-gradient(135deg,rgba(14,165,233,.36),rgba(15,23,42,.76));
    }
    .roomSkinNote{margin:8px 0 0;font-size:12px;color:var(--muted)}
    .actionRow{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;margin-top:14px}
    .actionRow button{padding:10px 12px;border-radius:12px;border:1px solid var(--border);font-weight:900}
    @media (pointer:coarse){#joyBase{display:block}.hud .info{max-width:calc(100vw - 18px);overflow:hidden;text-overflow:ellipsis}.hud{right:8px}#chatView{display:none;left:8px;right:8px;top:62px;bottom:auto;width:auto;max-height:42vh}#chatView.mobileOpen{display:flex}#composer{bottom:8px}.mobileOnly{display:inline-flex!important}}
    .mobileOnly{display:none!important}
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div class="hud">
    <button id="leaveBtn">退室</button>
    <button id="menuBtn">メニュー</button>
    <button id="toggleChat" class="mobileOnly">チャット</button>
    <div class="info">ルーム: <span id="roomId">-</span> ／ 自分: <span id="who">-</span> ／ 人数: <span id="count">0</span></div>
    <button id="copyRoomBtn">コピー</button>
  </div>

  <div id="chatView" aria-label="チャット"></div>
  <div id="composer">
    <input id="text" maxlength="500" placeholder="メッセージを入力。Enterで送信" autocomplete="off" />
    <button id="send">送信</button>
  </div>

  <button id="reactFab" title="リアクション">😊</button>
  <div id="reactMenu"></div>
  <button id="flyBtn" title="フライト">✈️</button>
  <div id="joyBase"><div id="joyStick"></div></div>
  <div id="toast"></div>

  <div id="roomMenuWrap" class="modalWrap">
    <div class="modal">
      <h2>ルームメニュー</h2>
      <div id="roomSkinPicker" class="roomSkinPicker">
        <div class="roomSkinTitle">スキン変更</div>
        <div class="roomSkinChoices">
          <button type="button" data-room-skin="nikorihito" aria-pressed="false">
            <img src="./nikorihito_dot_front.png" alt="" />
            <span>ニコリヒト</span>
          </button>
          <button type="button" data-room-skin="turuturu" aria-pressed="false">
            <img src="./turuturu_front.png" alt="" />
            <span>つるつる君</span>
          </button>
        </div>
        <p class="roomSkinNote">飛行機はどちらを選んでも共通です。</p>
      </div>
      <p>このルームはアカウント・パスワードなしで入室できます。同じルーム名を入力した人が同じ部屋に入ります。</p>
      <div class="actionRow">
        <button id="closeMenuBtn" class="subBtn">閉じる</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js';
    import { getDatabase, ref, onDisconnect, set, update, remove, onValue, push, query, limitToLast, onChildAdded } from 'https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js';

    const firebaseConfig = {
      apiKey: 'AIzaSyCy3P-HQhfd8-zpPUJ5YANxwRMuTCjFFAQ',
      authDomain: 'nikori-town.firebaseapp.com',
      databaseURL: 'https://nikori-town-default-rtdb.asia-southeast1.firebasedatabase.app',
      projectId: 'nikori-town',
      storageBucket: 'nikori-town.appspot.com',
      messagingSenderId: '836836010871',
      appId: '1:836836010871:web:74ae40cb16ee6d50368f72'
    };

    const SCALE = 6;
    const SPEED_PPS = 320;
    const FLY_SPEED_PPS = SPEED_PPS * 2.2;
    const RADIUS = 10;
    const PLAYER_INTERP = 12;
    const CAM_INTERP = 10;
    const SYNC_MS = 50;
    const MAX_MSG = 100;
    const PLANE_MIN_SIZE = 190;
    const PLANE_SCALE = 4.6;
    const EMOJIS = ['😊','❤️','👏','🎉','👍','✨','😂','😮'];

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app, firebaseConfig.databaseURL);
    const $ = id => document.getElementById(id);
    const canvas = $('game');
    const ctx = canvas.getContext('2d');
    const roomIdEl = $('roomId');
    const whoEl = $('who');
    const countEl = $('count');
    const chatView = $('chatView');
    const textEl = $('text');
    const sendBtn = $('send');
    const toastEl = $('toast');
    const flyBtn = $('flyBtn');
    const joyBase = $('joyBase');
    const joyStick = $('joyStick');
    const reactFab = $('reactFab');
    const reactMenu = $('reactMenu');

    const LS_SKIN = 'nikoriTown.skin';
    const url = new URL(location.href);
    const ROOM = safeKey(url.searchParams.get('room') || 'room-001');
    const NAME = safeName(url.searchParams.get('name') || localStorage.getItem('nikoriTown.playerName') || 'ゲスト');
    let mySkin = normalizeSkin(url.searchParams.get('skin') || localStorage.getItem(LS_SKIN) || 'nikorihito');
    localStorage.setItem(LS_SKIN, mySkin);
    roomIdEl.textContent = ROOM;
    whoEl.textContent = NAME;

    function showToast(message, ms = 2600){
      toastEl.textContent = message;
      toastEl.style.display = 'block';
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toastEl.style.display = 'none', ms);
    }
    function clamp(v,min,max){return Math.max(min,Math.min(max,v))}
    function now(){return Date.now()}
    function safeKey(s){return String(s||'').trim().toLowerCase().replace(/[.#$/\[\]\/]/g,'-').replace(/[^\w\-ぁ-んァ-ヶ一-龠]/g,'-').slice(0,32)||'room-001'}
    function safeName(s){return String(s||'guest').trim().slice(0,24)||'guest'}
    function normalizeSkin(s){return s === 'turuturu' ? 'turuturu' : 'nikorihito'}

    async function ensureAnonAuth(){
      if (auth.currentUser) return auth.currentUser;
      await signInAnonymously(auth);
      return await new Promise(resolve => {
        const stop = onAuthStateChanged(auth, user => {
          if (user) { stop(); resolve(user); }
        });
      });
    }

    function loadImage(src,{fallbackSize=[2048,2048],label='asset'}={}){
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => {
          const c = document.createElement('canvas');
          c.width = fallbackSize[0];
          c.height = fallbackSize[1];
          const g = c.getContext('2d');
          g.fillStyle = '#0f172a';
          g.fillRect(0,0,c.width,c.height);
          g.fillStyle = '#94a3b8';
          g.font = '24px system-ui';
          g.fillText(label,20,42);
          const f = new Image();
          f.onload = () => resolve(f);
          f.src = c.toDataURL('image/png');
        };
        img.src = src;
      });
    }

    const imgMap = await loadImage('./map_1.png?v=20260625-no-account', {fallbackSize:[2048,2048], label:'map'});
    const imgMask = await loadImage('./atarihantei.png?v=20260625-no-account', {fallbackSize:[2048,2048], label:'mask'});
    const imgPlane = await loadImage('./nikori_airplane.png?v=20260625-common-plane', {fallbackSize:[48,48], label:'plane'});
    const imgNikoriFront = await loadImage('./nikorihito_dot_front.png?v=20260625-skin', {fallbackSize:[32,32], label:'nikorihito front'});
    const imgNikoriBack = await loadImage('./nikorihito_dot_behind.png?v=20260625-skin', {fallbackSize:[32,32], label:'nikorihito back'});
    const imgNikoriLeft = await loadImage('./nikorihito_dot_left.png?v=20260625-skin', {fallbackSize:[32,32], label:'nikorihito left'});
    const imgNikoriRight = await loadImage('./nikorihito_dot_right.png?v=20260625-skin', {fallbackSize:[32,32], label:'nikorihito right'});
    const imgTuruturuFront = await loadImage('./turuturu_front.png?v=20260625-skin', {fallbackSize:[32,32], label:'turuturu front'});
    const imgTuruturuBack = await loadImage('./turuturu_behind.png?v=20260625-skin', {fallbackSize:[32,32], label:'turuturu back'});
    const imgTuruturuLeft = await loadImage('./turuturu_left.png?v=20260625-skin', {fallbackSize:[32,32], label:'turuturu left'});
    const imgTuruturuRight = await loadImage('./turuturu_right.png?v=20260625-skin', {fallbackSize:[32,32], label:'turuturu right'});

    const SKINS = {
      nikorihito:{name:'ニコリヒト',front:imgNikoriFront,back:imgNikoriBack,left:imgNikoriLeft,right:imgNikoriRight},
      turuturu:{name:'つるつる君',front:imgTuruturuFront,back:imgTuruturuBack,left:imgTuruturuLeft,right:imgTuruturuRight}
    };

    ctx.imageSmoothingEnabled = false;
    function resize(){
      canvas.width = innerWidth;
      canvas.height = innerHeight;
      ctx.imageSmoothingEnabled = false;
    }
    addEventListener('resize', resize);
    resize();

    const world = {w:imgMap.width, h:imgMap.height};
    const maskCanvas = typeof OffscreenCanvas !== 'undefined'
      ? new OffscreenCanvas(imgMask.width,imgMask.height)
      : Object.assign(document.createElement('canvas'), {width:imgMask.width, height:imgMask.height});
    const mctx = maskCanvas.getContext('2d');
    mctx.drawImage(imgMask,0,0);
    const mdata = mctx.getImageData(0,0,imgMask.width,imgMask.height);
    const mpix = mdata.data;
    const MW = imgMask.width;

    function isBlocked(x,y){
      x = x|0; y = y|0;
      if (x < 0 || y < 0 || x >= world.w || y >= world.h) return true;
      const i = (y * MW + x) * 4;
      const r = mpix[i], g = mpix[i+1], b = mpix[i+2], a = mpix[i+3];
      if (a < 10) return false;
      return r >= 180 && g <= 80 && b <= 80;
    }
    function hits(x,y){
      const foot = y + RADIUS * .6;
      return isBlocked(x, foot) || isBlocked(x - RADIUS*.7, foot) || isBlocked(x + RADIUS*.7, foot);
    }
    function safeSpawn(maxTry=500){
      for (let i=0;i<maxTry;i++){
        const x = Math.random()*(world.w-64)+32;
        const y = Math.random()*(world.h-64)+32;
        if (!hits(x,y)) return {x,y};
      }
      return {x:world.w/2,y:world.h/2};
    }

    await ensureAnonAuth();
    const meId = crypto.randomUUID ? crypto.randomUUID() : `m${Math.random().toString(36).slice(2)}`;
    const playersRef = ref(db, `rooms/${ROOM}/players`);
    const meRef = ref(db, `rooms/${ROOM}/players/${meId}`);
    const roomMetaRef = ref(db, `roomMeta/${ROOM}`);

    let my = Object.assign({name:NAME,dir:'front',skin:mySkin,ts:now(),fly:false}, safeSpawn());
    let players = {};
    let ghosts = {};
    let isFlying = false;
    let lastSync = 0;
    let camX = 0;
    let camY = 0;

    await update(roomMetaRef, {room:ROOM,noAccountMode:true,passwordEnabled:false,updatedAt:now()});
    await set(meRef, my);
    onDisconnect(meRef).remove().catch(()=>{});

    onValue(playersRef, snap => {
      players = snap.val() || {};
      countEl.textContent = Object.keys(players).length;
      for (const [id,p] of Object.entries(players)) {
        if (!p) continue;
        if (!ghosts[id]) {
          ghosts[id] = {x:p.x||0,y:p.y||0,tx:p.x||0,ty:p.y||0,dir:p.dir||'front',skin:normalizeSkin(p.skin),name:p.name||'guest',fly:!!p.fly};
        }
        Object.assign(ghosts[id], {
          tx:p.x ?? ghosts[id].x,
          ty:p.y ?? ghosts[id].y,
          dir:p.dir || ghosts[id].dir,
          skin:normalizeSkin(p.skin || ghosts[id].skin),
          name:p.name || ghosts[id].name,
          fly:!!p.fly
        });
      }
      for (const id of Object.keys(ghosts)) if (!players[id]) delete ghosts[id];
    });

    function syncMe(force=false){
      const t = now();
      if (!force && t - lastSync < SYNC_MS) return;
      lastSync = t;
      my.ts = t;
      my.fly = isFlying;
      my.skin = mySkin;
      update(meRef, {x:my.x,y:my.y,dir:my.dir,skin:mySkin,ts:my.ts,fly:my.fly}).catch(console.warn);
    }

    async function cleanup(){
      try { await remove(meRef); } catch {}
    }
    $('leaveBtn').onclick = async () => { await cleanup(); location.href = './index.html'; };
    addEventListener('beforeunload', () => cleanup());

    $('menuBtn').onclick = () => { $('roomMenuWrap').style.display = 'flex'; updateRoomSkinButtons(); };
    $('closeMenuBtn').onclick = () => $('roomMenuWrap').style.display = 'none';
    addEventListener('keydown', e => {
      if (e.key === 'Escape') $('roomMenuWrap').style.display = $('roomMenuWrap').style.display === 'flex' ? 'none' : 'flex';
    });
    $('copyRoomBtn').onclick = async () => {
      const u = new URL(location.href);
      u.searchParams.delete('name');
      try { await navigator.clipboard.writeText(u.toString()); showToast('ルームURLをコピーしました'); }
      catch { showToast('コピーできませんでした'); }
    };

    function updateRoomSkinButtons(){
      document.querySelectorAll('[data-room-skin]').forEach(btn => {
        const active = btn.dataset.roomSkin === mySkin;
        btn.classList.toggle('active', active);
        btn.setAttribute('aria-pressed', String(active));
      });
    }
    function setRoomSkin(skin){
      mySkin = normalizeSkin(skin);
      my.skin = mySkin;
      localStorage.setItem(LS_SKIN, mySkin);
      updateRoomSkinButtons();
      syncMe(true);
      showToast(`${SKINS[mySkin].name}に変更しました`);
    }
    document.querySelectorAll('[data-room-skin]').forEach(btn => btn.onclick = () => setRoomSkin(btn.dataset.roomSkin));
    updateRoomSkinButtons();

    const chatRef = ref(db, `rooms/${ROOM}/chat`);
    function addChatItem(id,m){
      const el = document.createElement('div');
      el.className = 'chatItem' + (m.uid === meId ? ' me' : '');
      const n = document.createElement('div');
      n.className = 'nameLine';
      n.textContent = m.name || 'guest';
      const line = document.createElement('div');
      line.textContent = m.text || '';
      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent = new Date(m.ts || now()).toLocaleString();
      el.append(n,line,meta);
      chatView.appendChild(el);
      chatView.scrollTop = chatView.scrollHeight;
      while (chatView.children.length > MAX_MSG) chatView.firstChild.remove();
    }
    onChildAdded(query(chatRef, limitToLast(MAX_MSG)), snap => addChatItem(snap.key, snap.val() || {}));

    async function sendChat(){
      const text = textEl.value.trim();
      if (!text) return;
      textEl.value = '';
      await push(chatRef, {uid:meId,name:NAME,text:text.slice(0,500),ts:now()});
    }
    sendBtn.onclick = sendChat;
    textEl.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); sendChat(); } });
    $('toggleChat').onclick = () => chatView.classList.toggle('mobileOpen');

    const bubblesRef = ref(db, `rooms/${ROOM}/bubbles`);
    reactFab.onclick = () => {
      reactMenu.innerHTML = '';
      EMOJIS.forEach(emoji => {
        const b = document.createElement('button');
        b.textContent = emoji;
        b.onclick = () => { push(bubblesRef,{uid:meId,emoji,ts:now()}); reactMenu.style.display = 'none'; };
        reactMenu.appendChild(b);
      });
      reactMenu.style.display = reactMenu.style.display === 'block' ? 'none' : 'block';
    };
    const bubbles = new Map();
    function showBubbleFor(uid, emoji){
      let b = bubbles.get(uid);
      if (!b) { b = document.createElement('div'); b.className = 'bubble'; document.body.appendChild(b); bubbles.set(uid,b); }
      b.textContent = emoji;
      b.style.display = 'block';
      clearTimeout(b._t);
      b._t = setTimeout(() => b.style.display = 'none', 1800);
    }
    onChildAdded(query(bubblesRef, limitToLast(50)), snap => {
      const {uid,emoji,ts} = snap.val() || {};
      if (uid && emoji && now() - (ts || 0) <= 5000) showBubbleFor(uid, emoji);
    });

    const keys = new Set();
    addEventListener('keydown', e => {
      if (['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName)) return;
      const k = e.key.toLowerCase();
      keys.add(k);
      if (k === 'f') setFlight(!isFlying);
    });
    addEventListener('keyup', e => keys.delete(e.key.toLowerCase()));

    let joy = {x:0,y:0,active:false};
    function updateJoy(touch){
      const r = joyBase.getBoundingClientRect();
      const cx = r.left + r.width/2;
      const cy = r.top + r.height/2;
      const dx = touch.clientX - cx;
      const dy = touch.clientY - cy;
      const max = r.width * .34;
      joy.x = clamp(dx/max,-1,1);
      joy.y = clamp(dy/max,-1,1);
      joyStick.style.transform = `translate(calc(-50% + ${clamp(dx,-max,max)}px), calc(-50% + ${clamp(dy,-max,max)}px))`;
    }
    joyBase.addEventListener('touchstart', e => { joy.active=true; updateJoy(e.touches[0]); }, {passive:false});
    joyBase.addEventListener('touchmove', e => { e.preventDefault(); updateJoy(e.touches[0]); }, {passive:false});
    joyBase.addEventListener('touchend', () => { joy.active=false; joy.x=0; joy.y=0; joyStick.style.transform='translate(-50%,-50%)'; });

    function setFlight(on){
      if (on === isFlying) return;
      if (!on && hits(my.x,my.y)) { showToast('ここでは着地できません。赤い当たり判定の外に移動してください。'); return; }
      isFlying = on;
      flyBtn.classList.toggle('on', isFlying);
      syncMe(true);
    }
    flyBtn.onclick = () => setFlight(!isFlying);

    function move(dt){
      let dx=0, dy=0;
      if (keys.has('arrowleft') || keys.has('a')) dx -= 1;
      if (keys.has('arrowright') || keys.has('d')) dx += 1;
      if (keys.has('arrowup') || keys.has('w')) dy -= 1;
      if (keys.has('arrowdown') || keys.has('s')) dy += 1;
      if (joy.active) { dx += joy.x; dy += joy.y; }
      if (dx === 0 && dy === 0) return;
      const len = Math.hypot(dx,dy) || 1;
      dx /= len; dy /= len;
      if (Math.abs(dx) > Math.abs(dy)) my.dir = dx < 0 ? 'left' : 'right';
      else my.dir = dy < 0 ? 'back' : 'front';
      const speed = isFlying ? FLY_SPEED_PPS : SPEED_PPS;
      const nx = clamp(my.x + dx*speed*dt, 0, world.w-1);
      const ny = clamp(my.y + dy*speed*dt, 0, world.h-1);
      if (isFlying || !hits(nx,my.y)) my.x = nx;
      if (isFlying || !hits(my.x,ny)) my.y = ny;
      syncMe();
    }

    function spriteByDir(d, skinId=mySkin){
      const skin = SKINS[normalizeSkin(skinId)] || SKINS.nikorihito;
      if (d === 'back') return {img:skin.back, flip:false};
      if (d === 'left') return {img:skin.left, flip:false};
      if (d === 'right') return {img:skin.right, flip:false};
      return {img:skin.front, flip:false};
    }

    function camera(dt){
      const tx = Math.round(my.x - canvas.width/2);
      const ty = Math.round(my.y - canvas.height/2);
      const k = Math.min(1, dt*CAM_INTERP);
      camX += (tx - camX) * k;
      camY += (ty - camY) * k;
      camX = clamp(camX, 0, Math.max(0, world.w - canvas.width));
      camY = clamp(camY, 0, Math.max(0, world.h - canvas.height));
      return {x:camX,y:camY};
    }

    function drawImageCentered(img,x,y,w,h,flip=false,alpha=1){
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(x,y);
      if (flip) ctx.scale(-1,1);
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(img,-w/2,-h/2,w,h);
      ctx.restore();
    }
    function roundRect(g,x,y,w,h,r){
      g.beginPath();
      g.moveTo(x+r,y);
      g.arcTo(x+w,y,x+w,y+h,r);
      g.arcTo(x+w,y+h,x,y+h,r);
      g.arcTo(x,y+h,x,y,r);
      g.arcTo(x,y,x+w,y,r);
      g.closePath();
    }
    function drawPlayer(p,id,cam){
      const sx = Math.round(p.x - cam.x);
      const sy = Math.round(p.y - cam.y);
      let labelY;
      if (p.fly) {
        const planeW = Math.max(PLANE_MIN_SIZE, imgPlane.width * PLANE_SCALE);
        const planeH = Math.max(PLANE_MIN_SIZE, imgPlane.height * PLANE_SCALE);
        drawImageCentered(imgPlane, sx, sy + 8, planeW, planeH, false, 1);
        labelY = sy + 8 - planeH/2 - 16;
      } else {
        const sp = spriteByDir(p.dir || 'front', p.skin || mySkin);
        const w = sp.img.width * SCALE;
        const h = sp.img.height * SCALE;
        drawImageCentered(sp.img, sx, sy, w, h, sp.flip, 1);
        labelY = sy - h/2 - 16;
      }
      const name = p.name || 'guest';
      ctx.save();
      ctx.font = '700 13px system-ui';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const textW = ctx.measureText(name).width;
      ctx.fillStyle = 'rgba(15,23,42,.72)';
      ctx.strokeStyle = 'rgba(148,163,184,.45)';
      ctx.lineWidth = 1;
      roundRect(ctx, sx-textW/2-8, labelY-10, textW+16, 20, 8);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#e2e8f0';
      ctx.fillText(name, sx, labelY);
      ctx.restore();
    }

    function updateBubbles(cam){
      for (const [uid,el] of bubbles) {
        const p = uid === meId ? my : ghosts[uid];
        if (!p) { el.style.display = 'none'; continue; }
        el.style.left = `${p.x - cam.x}px`;
        el.style.top = `${p.y - cam.y - 72}px`;
      }
    }
    function interpolateGhosts(dt){
      const k = Math.min(1, dt*PLAYER_INTERP);
      for (const [id,g] of Object.entries(ghosts)) {
        if (id === meId) continue;
        if (typeof g.tx === 'number') g.x += (g.tx - g.x) * k;
        if (typeof g.ty === 'number') g.y += (g.ty - g.y) * k;
      }
    }

    let last = performance.now();
    function frame(t){
      const dt = Math.min(.05, (t-last)/1000);
      last = t;
      move(dt);
      interpolateGhosts(dt);
      const cam = camera(dt);
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(imgMap, -Math.round(cam.x), -Math.round(cam.y));
      const drawList = [];
      for (const [id,g] of Object.entries(ghosts)) if (id !== meId) drawList.push([id,g]);
      drawList.push([meId,my]);
      drawList.sort((a,b) => (a[1].y||0) - (b[1].y||0));
      for (const [id,p] of drawList) drawPlayer(p,id,cam);
      updateBubbles(cam);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
    setInterval(() => syncMe(true), 2500);
    showToast('メニューからスキン変更できます。Fキーまたは✈️で飛行できます。', 3600);
  </script>
</body>
</html>
