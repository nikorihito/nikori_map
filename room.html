function move(dt){let dx=0,dy=0;if(keys.has('arrowleft')||keys.has('a'))dx-=1;if(keys.has('arrowright')||keys.has('d'))dx+=1;if(keys.has('arrowup')||keys.has('w'))dy-=1;if(keys.has('arrowdown')||keys.has('s'))dy+=1;if(joy.active){dx+=joy.x;dy+=joy.y}if(dx===0&&dy===0)return;const len=Math.hypot(dx,dy)||1;dx/=len;dy/=len;if(Math.abs(dx)>Math.abs(dy))my.dir=dx<0?'left':'right';else my.dir=dy<0?'back':'front';const speed=isFlying?FLY_SPEED_PPS:SPEED_PPS,nx=clamp(my.x+dx*speed*dt,0,world.w-1),ny=clamp(my.y+dy*speed*dt,0,world.h-1);if(isFlying||!hits(nx,my.y))my.x=nx;if(isFlying||!hits(my.x,ny))my.y=ny;syncMe()}
function spriteByDir(d){if(d==='back')return{img:imgBack,flip:false};if(d==='left')return{img:imgSide,flip:true};if(d==='right')return{img:imgSide,flip:false};return{img:imgFront,flip:false}}let camX=0,camY=0;function camera(dt){const tx=Math.round(my.x-canvas.width/2),ty=Math.round(my.y-canvas.height/2),k=Math.min(1,dt*CAM_INTERP);camX+=(tx-camX)*k;camY+=(ty-camY)*k;camX=clamp(camX,0,Math.max(0,world.w-canvas.width));camY=clamp(camY,0,Math.max(0,world.h-canvas.height));return{x:camX,y:camY}}
function drawPlayer(p,id,cam){const sx=Math.round(p.x-cam.x),sy=Math.round(p.y-cam.y),fly=!!p.fly;let labelY;if(fly){const planeW=Math.max(PLANE_MIN_SIZE,imgPlane.width*PLANE_SCALE),planeH=Math.max(PLANE_MIN_SIZE,imgPlane.height*PLANE_SCALE);drawImageCentered(imgPlane,sx,sy+8,planeW,planeH,false,1);labelY=sy+8-planeH/2-16}else{const sp=spriteByDir(p.dir||'front'),w=sp.img.width*SCALE,h=sp.img.height*SCALE;drawImageCentered(sp.img,sx,sy,w,h,sp.flip,1);labelY=sy-h/2-16}const name=p.name||'guest',speaking=isSpeaking(id);ctx.save();ctx.font=speaking?'800 14px system-ui':'700 13px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';const textW=ctx.measureText(name).width;ctx.fillStyle=speaking?'rgba(34,197,94,.30)':'rgba(15,23,42,.72)';ctx.strokeStyle=speaking?'#22c55e':'rgba(148,163,184,.45)';ctx.lineWidth=speaking?2:1;roundRect(ctx,sx-textW/2-8,labelY-10,textW+16,20,8);ctx.fill();ctx.stroke();ctx.fillStyle='#e2e8f0';ctx.fillText(name,sx,labelY);ctx.restore()}function drawImageCentered(img,x,y,w,h,flip=false,alpha=1){ctx.save();ctx.globalAlpha=alpha;ctx.translate(x,y);if(flip)ctx.scale(-1,1);ctx.imageSmoothingEnabled=false;ctx.drawImage(img,-w/2,-h/2,w,h);ctx.restore()}function roundRect(g,x,y,w,h,r){g.beginPath();g.moveTo(x+r,y);g.arcTo(x+w,y,x+w,y+h,r);g.arcTo(x+w,y+h,x,y+h,r);g.arcTo(x,y+h,x,y,r);g.arcTo(x,y,x+w,y,r);g.closePath()}function updateBubbles(cam){for(const[uid,el]of bubbles){const p=uid===meId?my:ghosts[uid];if(!p){el.style.display='none';continue}el.style.left=`${p.x-cam.x}px`;el.style.top=`${p.y-cam.y-72}px`}}function interpolateGhosts(dt){const k=Math.min(1,dt*PLAYER_INTERP);for(const[id,g]of Object.entries(ghosts)){if(id===meId)continue;if(typeof g.tx==='number')g.x+=(g.tx-g.x)*k;if(typeof g.ty==='number')g.y+=(g.ty-g.y)*k}}
let last=performance.now();function frame(t){const rawDt=Math.min(.05,(t-last)/1000);last=t;const dt=Math.max(rawDt,FRAME_MIN/1000);move(dt);interpolateGhosts(dt);const cam=camera(dt);ctx.clearRect(0,0,canvas.width,canvas.height);ctx.imageSmoothingEnabled=false;ctx.drawImage(imgMap,-Math.round(cam.x),-Math.round(cam.y));const drawList=[];for(const[id,g]of Object.entries(ghosts)){if(id!==meId)drawList.push([id,g])}drawList.push([meId,my]);drawList.sort((a,b)=>(a[1].y||0)-(b[1].y||0));for(const[id,p]of drawList)drawPlayer(p,id,cam);updateBubbles(cam);requestAnimationFrame(frame)}requestAnimationFrame(frame);setInterval(()=>{syncMe(true);connectToKnownPeers()},2500);setInterval(()=>{const cutoff=now()-15000;for(const[id,p]of Object.entries(players)){if(id!==meId&&p.ts&&p.ts<cutoff)closePeer(id)}},5000);$('toggleChat').onclick=()=>chatView.classList.toggle('mobileOpen');$('toggleAv').onclick=()=>avGrid.classList.toggle('mobileOpen');updateAvButtons();showToast('Escでメニューを開くと、ルームの絵文字パスワードを確認できます。',3500);
</script>
