<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ニコリタウン - ルーム</title>

  <style>
    :root {
      --bg: #020617;
      --panel: rgba(15, 23, 42, 0.88);
      --panel2: rgba(2, 6, 23, 0.75);
      --border: rgba(148, 163, 184, 0.28);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #22d3ee;
      --accent2: #06b6d4;
      --danger: #ef4444;
      --ok: #22c55e;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: 0;
    }

    #gameCanvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: #0f172a;
      image-rendering: auto;
    }

    .topbar {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      left: 12px;
      right: 12px;
      z-index: 10;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      pointer-events: none;
    }

    .info {
      pointer-events: auto;
      min-height: 44px;
      padding: 10px 13px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--panel);
      box-shadow: 0 16px 38px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(10px);
      font-size: 13px;
      line-height: 1.5;
    }

    .info strong {
      color: #a5f3fc;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    .btn {
      min-height: 42px;
      padding: 10px 13px;
      border-radius: 14px;
      background: linear-gradient(180deg, var(--accent), var(--accent2));
      color: #06202a;
      font-weight: 950;
      box-shadow: 0 12px 26px rgba(6, 182, 212, 0.13);
    }

    .btn.secondary {
      background: rgba(30, 41, 59, 0.92);
      border: 1px solid var(--border);
      color: var(--text);
      box-shadow: none;
    }

    #flyBtn.is-flying,
    .pad-fly.is-flying {
      background: linear-gradient(180deg, #3b82f6, #2563eb);
      border-color: rgba(147, 197, 253, 0.9);
      color: #ffffff;
      box-shadow:
        0 0 0 3px rgba(59, 130, 246, 0.22),
        0 12px 26px rgba(37, 99, 235, 0.22);
    }

    .btn.danger {
      background: rgba(239, 68, 68, 0.95);
      color: white;
      box-shadow: none;
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .chat {
      position: fixed;
      left: 12px;
      bottom: max(12px, env(safe-area-inset-bottom));
      z-index: 10;
      width: min(430px, calc(100vw - 24px));
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(10px);
      overflow: hidden;
    }

    .chat-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      font-weight: 950;
      font-size: 13px;
      color: #a5f3fc;
    }

    .chat-list {
      height: 150px;
      overflow-y: auto;
      padding: 10px 12px;
      display: grid;
      align-content: start;
      gap: 7px;
      font-size: 13px;
      line-height: 1.45;
    }

    .message {
      padding: 7px 9px;
      border-radius: 13px;
      background: rgba(2, 6, 23, 0.42);
      border: 1px solid rgba(148, 163, 184, 0.16);
      word-break: break-word;
    }

    .message-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 3px;
    }

    .message-name {
      color: #67e8f9;
      font-weight: 950;
      margin-right: 5px;
      cursor: pointer;
    }

    .message-text.edited::after {
      content: "（編集済み）";
      color: var(--muted);
      font-size: 11px;
      margin-left: 4px;
    }

    .mention {
      color: #fef08a;
      font-weight: 900;
    }

    .reply-preview {
      margin: 5px 0 7px;
      padding: 6px 8px;
      border-left: 3px solid var(--accent);
      border-radius: 8px;
      background: rgba(14, 165, 233, 0.10);
      color: #bae6fd;
      font-size: 12px;
    }

    .message-actions {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .message-actions button {
      min-height: 26px;
      padding: 3px 7px;
      border-radius: 9px;
      background: rgba(30, 41, 59, 0.82);
      border: 1px solid rgba(148, 163, 184, 0.24);
      color: var(--text);
      font-size: 12px;
      font-weight: 800;
    }

    .compose-state {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      background: rgba(14, 165, 233, 0.12);
      color: #bae6fd;
      font-size: 12px;
      line-height: 1.5;
    }

    .compose-state[hidden] {
      display: none;
    }

    .compose-state button {
      min-width: 28px;
      min-height: 28px;
      border-radius: 9px;
      background: rgba(30, 41, 59, 0.9);
      border: 1px solid var(--border);
      color: var(--text);
      font-weight: 900;
    }

    .chat-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 10px;
      border-top: 1px solid var(--border);
    }

    .chat-form input {
      min-width: 0;
      padding: 11px 12px;
      border-radius: 13px;
      border: 1px solid var(--border);
      background: #07101f;
      color: var(--text);
      outline: none;
    }

    .chat-form input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.17);
    }

    .quick {
      display: flex;
      gap: 7px;
      padding: 0 10px 10px;
      flex-wrap: wrap;
    }

    .quick button {
      min-width: 40px;
      min-height: 35px;
      border-radius: 12px;
      background: rgba(30, 41, 59, 0.9);
      border: 1px solid var(--border);
      color: var(--text);
      font-weight: 850;
    }

    .menu-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(2, 6, 23, 0.62);
      backdrop-filter: blur(7px);
    }

    .menu-backdrop[hidden] {
      display: none;
    }

    .menu {
      width: min(620px, 94vw);
      max-height: 90svh;
      overflow: auto;
      border-radius: 24px;
      background: rgba(15, 23, 42, 0.97);
      border: 1px solid rgba(148, 163, 184, 0.26);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.55);
      padding: 20px;
    }

    .menu h2 {
      margin: 0 0 12px;
      font-size: 22px;
    }

    .menu p {
      color: var(--muted);
      line-height: 1.75;
      margin: 8px 0 14px;
      font-size: 13px;
    }

    .menu-grid {
      display: grid;
      gap: 14px;
    }

    .room-copy {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .room-copy input {
      min-width: 0;
      padding: 11px 12px;
      border-radius: 13px;
      border: 1px solid var(--border);
      background: #07101f;
      color: var(--text);
    }

    .skin-picker,
    .map-picker {
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(2, 6, 23, 0.28);
    }

    .skin-title {
      font-weight: 950;
      margin-bottom: 10px;
      letter-spacing: 0.04em;
    }

    .skin-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .skin-choice {
      min-width: 145px;
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 10px 12px;
      border-radius: 17px;
      border: 1px solid rgba(148, 163, 184, 0.30);
      background: rgba(15, 23, 42, 0.82);
      color: var(--text);
      font-weight: 900;
    }

    .skin-choice img {
      width: 42px;
      height: 42px;
      object-fit: contain;
      image-rendering: pixelated;
    }

    .map-choice {
      min-width: 190px;
    }

    .map-choice img {
      width: 64px;
      height: 42px;
      border-radius: 8px;
      object-fit: cover;
      image-rendering: auto;
    }

    .skin-choice.active {
      border-color: rgba(34, 211, 238, 0.95);
      box-shadow:
        0 0 0 3px rgba(34, 211, 238, 0.18),
        0 14px 34px rgba(34, 211, 238, 0.10);
      background: linear-gradient(135deg, rgba(14,165,233,0.34), rgba(15,23,42,0.82));
    }

    .menu-actions {
      display: flex;
      justify-content: flex-end;
      gap: 9px;
      flex-wrap: wrap;
      margin-top: 15px;
    }

    .mobile-pad {
      position: fixed;
      right: 12px;
      bottom: max(12px, env(safe-area-inset-bottom));
      z-index: 11;
      display: none;
      grid-template-columns: repeat(3, 48px);
      grid-template-rows: repeat(3, 48px);
      gap: 6px;
      pointer-events: auto;
    }

    .mobile-pad button {
      border-radius: 15px;
      background: rgba(15, 23, 42, 0.82);
      border: 1px solid var(--border);
      color: var(--text);
      font-weight: 950;
      box-shadow: 0 10px 26px rgba(0,0,0,0.25);
    }

    .pad-up { grid-column: 2; grid-row: 1; }
    .pad-left { grid-column: 1; grid-row: 2; }
    .pad-fly { grid-column: 2; grid-row: 2; }
    .pad-right { grid-column: 3; grid-row: 2; }
    .pad-down { grid-column: 2; grid-row: 3; }

    .loading {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 30% 20%, rgba(34,211,238,0.18), transparent 35%),
        #020617;
      color: #a5f3fc;
      font-weight: 950;
      letter-spacing: 0.04em;
    }

    .loading[hidden] {
      display: none;
    }

    @media (max-width: 800px) {
      .chat {
        width: min(360px, calc(100vw - 24px));
      }

      .chat-list {
        height: 116px;
      }

      .mobile-pad {
        display: grid;
      }
    }

    @media (max-width: 540px) {
      .topbar {
        align-items: stretch;
      }

      .info {
        font-size: 12px;
      }

      .top-actions {
        flex-direction: column;
      }

      .chat {
        left: 8px;
        right: 8px;
        bottom: calc(176px + env(safe-area-inset-bottom));
        width: auto;
      }

      .mobile-pad {
        right: 8px;
      }
    }
  </style>
</head>

<body>
  <canvas id="gameCanvas"></canvas>

  <div class="topbar">
    <div class="info">
      ルーム: <strong id="roomLabel">-</strong>
      ／ 自分: <strong id="nameLabel">-</strong>
      ／ 人数: <strong id="countLabel">0</strong>
      ／ マップ: <strong id="mapLabel">-</strong>
      <br />
      <span id="helpLabel">移動: WASD / 矢印　飛行機: ↓ + H　メニュー: Esc</span>
    </div>

    <div class="top-actions">
      <button id="flyBtn" class="btn secondary" type="button">✈️ 飛行機</button>
      <button id="menuBtn" class="btn" type="button">メニュー</button>
    </div>
  </div>

  <section class="chat">
    <div class="chat-head">
      <span>通話チャット</span>
      <span id="chatStatus">接続中...</span>
    </div>

    <div id="composeState" class="compose-state" hidden>
      <span id="composeStateText"></span>
      <button id="composeCancelBtn" type="button">×</button>
    </div>

    <div id="chatList" class="chat-list"></div>

    <form id="chatForm" class="chat-form">
      <input id="chatInput" maxlength="240" placeholder="メッセージを入力" autocomplete="off" />
      <button class="btn" type="submit">送信</button>
    </form>

    <div class="quick">
      <button type="button" data-reaction="👋">👋</button>
      <button type="button" data-reaction="😄">😄</button>
      <button type="button" data-reaction="❤️">❤️</button>
      <button type="button" data-reaction="✈️">✈️</button>
    </div>
  </section>

  <div class="mobile-pad" aria-label="移動ボタン">
    <button class="pad-up" type="button" data-pad="up">▲</button>
    <button class="pad-left" type="button" data-pad="left">◀</button>
    <button class="pad-fly" type="button" data-pad="fly">✈️</button>
    <button class="pad-right" type="button" data-pad="right">▶</button>
    <button class="pad-down" type="button" data-pad="down">▼</button>
  </div>

  <div id="menuBackdrop" class="menu-backdrop" hidden>
    <section class="menu">
      <h2>ルームメニュー</h2>
      <p>
        このルームはパスワードなしです。同じルーム名を入力すると入れます。
        飛行機はニコリヒト・つるつる君で共通です。
        キーボードでは「↓を押しながらH」で飛行機を切り替えます。
      </p>

      <div class="menu-grid">
        <div>
          <div style="font-weight:950;margin-bottom:8px;">ルーム共有</div>
          <div class="room-copy">
            <input id="roomShareInput" readonly />
            <button id="copyRoomBtn" class="btn secondary" type="button">コピー</button>
          </div>
        </div>

        <section class="map-picker" aria-label="マップ変更">
          <div class="skin-title">マップ変更</div>
          <div id="mapChoiceRow" class="skin-row"></div>
        </section>

        <section class="skin-picker" aria-label="スキン変更">
          <div class="skin-title">スキン変更</div>

          <div class="skin-row">
            <button class="skin-choice" type="button" data-skin="nikorihito" aria-pressed="false">
              <img src="./nikorihito_dot_front.png" alt="" />
              <span>ニコリヒト</span>
            </button>

            <button class="skin-choice" type="button" data-skin="turuturu" aria-pressed="false">
              <img src="./turuturu_front.png" alt="" />
              <span>つるつる君</span>
            </button>
          </div>
        </section>
      </div>

      <div class="menu-actions">
        <button id="closeMenuBtn" class="btn secondary" type="button">閉じる</button>
        <button id="leaveBtn" class="btn danger" type="button">ホームへ戻る</button>
      </div>
    </section>
  </div>

  <div id="loading" class="loading">読み込み中...</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      signInAnonymously
    } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";
    import {
      getDatabase,
      ref,
      set,
      update,
      onValue,
      onDisconnect,
      remove,
      push,
      limitToLast,
      query,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCy3P-HQhfd8-zpPUJ5YANxwRMuTCjFFAQ",
      authDomain: "nikori-town.firebaseapp.com",
      databaseURL: "https://nikori-town-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "nikori-town",
      storageBucket: "nikori-town.appspot.com",
      messagingSenderId: "836836010871",
      appId: "1:836836010871:web:74ae40cb16ee6d50368f72"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app, firebaseConfig.databaseURL);

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const roomLabel = document.getElementById("roomLabel");
    const nameLabel = document.getElementById("nameLabel");
    const countLabel = document.getElementById("countLabel");
    const mapLabel = document.getElementById("mapLabel");
    const chatStatus = document.getElementById("chatStatus");
    const chatList = document.getElementById("chatList");
    const chatForm = document.getElementById("chatForm");
    const chatInput = document.getElementById("chatInput");
    const composeState = document.getElementById("composeState");
    const composeStateText = document.getElementById("composeStateText");
    const composeCancelBtn = document.getElementById("composeCancelBtn");
    const flyBtn = document.getElementById("flyBtn");
    const menuBtn = document.getElementById("menuBtn");
    const menuBackdrop = document.getElementById("menuBackdrop");
    const closeMenuBtn = document.getElementById("closeMenuBtn");
    const leaveBtn = document.getElementById("leaveBtn");
    const copyRoomBtn = document.getElementById("copyRoomBtn");
    const roomShareInput = document.getElementById("roomShareInput");
    const mapChoiceRow = document.getElementById("mapChoiceRow");
    const loading = document.getElementById("loading");

    const LS_NAME = "nikoriTown.playerName";
    const LS_ROOM = "nikoriTown.lastRoom";
    const LS_SKIN = "nikoriTown.skin";
    const LS_MAP = "nikoriTown.currentMap";

    const params = new URLSearchParams(location.search);

    const MAPS = [
      { name: "タウン", map: "./map_1.png", collision: "./atarihantei.png", spawn: { x: 520, y: 400 } },
      { name: "湖畔公園", map: "./map/textures/lakeside_park.png", collision: "./map/atarihantei/lakeside_park.png", spawn: { x: 1024, y: 680 } },
      { name: "森", map: "./map/textures/forest.png", collision: "./map/atarihantei/forest_atarihantei.png", spawn: { x: 1024, y: 680 } },
      { name: "海底都市", map: "./map/textures/underwater_city.png", collision: "./map/atarihantei/underwater_city.png", spawn: { x: 1024, y: 680 } },
      { name: "空中都市", map: "./map/textures/sky_city.png", collision: "./map/atarihantei/sky_city.png", spawn: { x: 1024, y: 680 } },
      { name: "サイバーシティ", map: "./map/textures/cyber_city.png", collision: "./map/atarihantei/cyber_city_atarihantei.png", spawn: { x: 1024, y: 680 } },
      { name: "白オフィス 1F", map: "./map/textures/office_white/office_white_1f.png", collision: "./map/atarihantei/office_white/office_white_1f.png", spawn: { x: 1024, y: 680 } },
      { name: "白オフィス 2F", map: "./map/textures/office_white/office_white_2f.png", collision: "./map/atarihantei/office_white/office_white_2f.png", spawn: { x: 1024, y: 680 } },
      { name: "白オフィス 屋上", map: "./map/textures/office_white/office_white_rooftop.png", collision: "./map/atarihantei/office_white/office_white_rooftop.png", spawn: { x: 1024, y: 680 } },
      { name: "黒オフィス 1F", map: "./map/textures/office_black/office_black_1f.png", collision: "./map/atarihantei/office_black/office_black_1f.png", spawn: { x: 1024, y: 680 } },
      { name: "黒オフィス 2F", map: "./map/textures/office_black/office_black_2f.png", collision: "./map/atarihantei/office_black/office_black_2f.png", spawn: { x: 1024, y: 680 } },
      { name: "黒オフィス 屋上", map: "./map/textures/office_black/office_black_rooftop.png", collision: "./map/atarihantei/office_black/office_black_rooftop.png", spawn: { x: 1024, y: 680 } },
      { name: "カフェ 1F", map: "./map/textures/cafe/cafe_1f.png", collision: "./map/atarihantei/cafe/cafe_1f.png", spawn: { x: 1024, y: 680 } },
      { name: "カフェ 2F", map: "./map/textures/cafe/cafe_2f.png", collision: "./map/atarihantei/cafe/cafe_2f.png", spawn: { x: 1024, y: 680 } },
      { name: "カフェ 屋上", map: "./map/textures/cafe/cafe_rooftop.png", collision: "./map/atarihantei/cafe/cafe_rooftop.png", spawn: { x: 1024, y: 680 } }
    ];

    let currentMapIndex = Number(params.get("map") ?? localStorage.getItem(LS_MAP) ?? "0");
    if (!Number.isFinite(currentMapIndex) || currentMapIndex < 0 || currentMapIndex >= MAPS.length) {
      currentMapIndex = 0;
    }

    const room = safeRoom(params.get("room") || localStorage.getItem(LS_ROOM) || "");
    const playerName = safeName(params.get("name") || localStorage.getItem(LS_NAME) || "ゲスト");
    let selectedSkin = normalizeSkin(params.get("skin") || localStorage.getItem(LS_SKIN) || "nikorihito");

    if (!room) {
      alert("ルーム名がありません。index.htmlから入り直してください。");
      location.href = "./index.html";
    }

    localStorage.setItem(LS_ROOM, room);
    localStorage.setItem(LS_NAME, playerName);
    localStorage.setItem(LS_SKIN, selectedSkin);

    roomLabel.textContent = room;
    nameLabel.textContent = playerName;
    roomShareInput.value = room;

    const ASSETS = {
      airplane: "./nikori_airplane.png",
      skins: {
        nikorihito: {
          front: "./nikorihito_dot_front.png",
          behind: "./nikorihito_dot_behind.png",
          left: "./nikorihito_dot_left.png",
          right: "./nikorihito_dot_right.png"
        },
        turuturu: {
          front: "./turuturu_front.png",
          behind: "./turuturu_behind.png",
          left: "./turuturu_left.png",
          right: "./turuturu_right.png"
        }
      }
    };

    const DRAW_HEIGHT = {
      nikorihito: 96,
      turuturu: 88
    };

    const WALK_SPEED = 400;
    const FLY_SPEED = WALK_SPEED * 2;

    /*
      飛行機サイズ。
      前回145だった想定から約2倍。
    */
    const AIRPLANE_HEIGHT = 290;

    const COLLISION_WALKABLE_BRIGHTNESS = 100;
    const COLLISION_STEP_SIZE = 5;

    const player = {
      uid: "",
      name: playerName,
      x: MAPS[currentMapIndex].spawn.x + Math.random() * 160,
      y: MAPS[currentMapIndex].spawn.y + Math.random() * 120,
      dir: "front",
      skin: selectedSkin,
      flying: false,
      reaction: "",
      reactionUntil: 0,
      updatedAt: Date.now()
    };

    const camera = {
      x: 0,
      y: 0
    };

    const keys = {
      up: false,
      down: false,
      left: false,
      right: false
    };

    let arrowDownHeld = false;
    let flightComboLocked = false;
    let replyTarget = null;
    let editingMessage = null;

    const state = {
      started: false,
      players: {},
      messages: [],
      worldW: 2200,
      worldH: 1400,
      mapLoaded: false,
      collisionLoaded: false,
      lastPush: 0,
      lastFrame: performance.now()
    };

    const images = {
      map: new Image(),
      collision: new Image(),
      airplane: new Image(),
      skins: {
        nikorihito: {
          front: new Image(),
          behind: new Image(),
          left: new Image(),
          right: new Image()
        },
        turuturu: {
          front: new Image(),
          behind: new Image(),
          left: new Image(),
          right: new Image()
        }
      }
    };

    images.airplane.src = ASSETS.airplane;

    for (const skinName of Object.keys(ASSETS.skins)) {
      for (const dir of Object.keys(ASSETS.skins[skinName])) {
        images.skins[skinName][dir].src = ASSETS.skins[skinName][dir];
      }
    }

    images.map.onload = () => {
      state.mapLoaded = true;
      state.worldW = images.map.naturalWidth || state.worldW;
      state.worldH = images.map.naturalHeight || state.worldH;

      player.x = clamp(player.x, 20, state.worldW - 20);
      player.y = clamp(player.y, 20, state.worldH - 20);
    };

    images.map.onerror = () => {
      console.warn("マップ画像が読み込めません:", MAPS[currentMapIndex].map);
      state.mapLoaded = false;
    };

    images.collision.onload = () => {
      state.collisionLoaded = true;
      canStandAt.offscreen = null;
      canStandAt.ctx = null;
      canStandAt.mapIndex = -1;
    };

    images.collision.onerror = () => {
      console.warn("当たり判定画像が読み込めません:", MAPS[currentMapIndex].collision);
      state.collisionLoaded = false;
    };

    function loadCurrentMapAssets() {
      const mapData = MAPS[currentMapIndex] || MAPS[0];

      state.mapLoaded = false;
      state.collisionLoaded = false;

      canStandAt.offscreen = null;
      canStandAt.ctx = null;
      canStandAt.mapIndex = -1;

      images.map.src = mapData.map + "?v=" + Date.now();
      if (mapData.collision) {
        images.collision.src = mapData.collision + "?v=" + Date.now();
      } else {
        images.collision.removeAttribute("src");
        state.collisionLoaded = false;
      }

      localStorage.setItem(LS_MAP, String(currentMapIndex));
      mapLabel.textContent = mapData.name;
      refreshMapButtons();
    }

    renderMapButtons();
    loadCurrentMapAssets();

    function resizeCanvas() {
      const dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
      canvas.width = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    function safeName(value) {
      const name = String(value || "").trim().slice(0, 16);
      return name || "ゲスト";
    }

    function safeRoom(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .replace(/[.#$/\[\]\/]/g, "-")
        .replace(/[^\w\-ぁ-んァ-ヶ一-龠]/g, "-")
        .replace(/-+/g, "-")
        .slice(0, 32);
    }

    function normalizeSkin(value) {
      return value === "turuturu" ? "turuturu" : "nikorihito";
    }

    function normalizeDir(value) {
      return ["front", "behind", "left", "right"].includes(value) ? value : "front";
    }

    function openMenu() {
      menuBackdrop.hidden = false;
      refreshSkinButtons();
      refreshMapButtons();
      updateFlyButtonState();
    }

    function closeMenu() {
      menuBackdrop.hidden = true;
    }

    function refreshSkinButtons() {
      document.querySelectorAll("[data-skin]").forEach((button) => {
        const active = button.dataset.skin === selectedSkin;
        button.classList.toggle("active", active);
        button.setAttribute("aria-pressed", String(active));
      });
    }

    function refreshMapButtons() {
      document.querySelectorAll("[data-map]").forEach((button) => {
        const active = Number(button.dataset.map) === currentMapIndex;
        button.classList.toggle("active", active);
        button.setAttribute("aria-pressed", String(active));
      });
    }

    function renderMapButtons() {
      mapChoiceRow.innerHTML = "";
      MAPS.forEach((mapData, index) => {
        const button = document.createElement("button");
        button.className = "skin-choice map-choice";
        button.type = "button";
        button.dataset.map = String(index);
        button.setAttribute("aria-pressed", "false");
        button.innerHTML = `<img src="${mapData.map}" alt="" /><span>${mapData.name}</span>`;
        button.addEventListener("click", () => {
          changeMap(index);
        });
        mapChoiceRow.appendChild(button);
      });
      refreshMapButtons();
    }

    async function changeSkin(skin) {
      selectedSkin = normalizeSkin(skin);
      player.skin = selectedSkin;
      localStorage.setItem(LS_SKIN, selectedSkin);
      refreshSkinButtons();

      if (player.uid) {
        await pushPlayer(true);
      }
    }

    async function changeMap(index) {
      const next = Number(index);

      if (!Number.isFinite(next) || next < 0 || next >= MAPS.length) {
        return;
      }

      currentMapIndex = next;
      localStorage.setItem(LS_MAP, String(currentMapIndex));

      const spawn = MAPS[currentMapIndex].spawn || { x: 520, y: 400 };
      player.x = spawn.x + Math.random() * 80;
      player.y = spawn.y + Math.random() * 80;

      loadCurrentMapAssets();
      await pushPlayer(true);

      if (player.uid) {
        await update(ref(db, `rooms/${room}/roomState`), {
          mapIndex: currentMapIndex,
          updatedAt: serverTimestamp()
        }).catch(console.warn);
      }
    }

    function updateFlyButtonState() {
      flyBtn.textContent = "✈️ 飛行機";
      flyBtn.classList.toggle("is-flying", player.flying);

      document.querySelectorAll(".pad-fly").forEach((button) => {
        button.classList.toggle("is-flying", player.flying);
      });
    }

    function toggleFlying() {
      if (player.flying) {
        if (!canStandAt(player.x, player.y)) {
          alert("ここには降りられません。通れる場所まで移動してから飛行機を降りてください。");
          updateFlyButtonState();
          return;
        }

        player.flying = false;
      } else {
        player.flying = true;
      }

      updateFlyButtonState();
      pushPlayer(true);
    }

    function copyRoomName() {
      const text = roomShareInput.value || room;

      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => {
          copyRoomBtn.textContent = "コピー済み";
          setTimeout(() => {
            copyRoomBtn.textContent = "コピー";
          }, 1000);
        });
      } else {
        roomShareInput.select();
        document.execCommand("copy");
      }
    }

    function leaveRoom() {
      location.href = "./index.html";
    }

    function isChatFocused() {
      return document.activeElement === chatInput;
    }

    window.addEventListener("keydown", (event) => {
      if (isChatFocused()) return;

      const key = event.key.toLowerCase();

      if (event.key === "ArrowUp" || key === "w") {
        keys.up = true;
        event.preventDefault();
      }

      if (event.key === "ArrowDown") {
        keys.down = true;
        arrowDownHeld = true;
        event.preventDefault();
      }

      if (key === "s") {
        keys.down = true;
        event.preventDefault();
      }

      if (event.key === "ArrowLeft" || key === "a") {
        keys.left = true;
        event.preventDefault();
      }

      if (event.key === "ArrowRight" || key === "d") {
        keys.right = true;
        event.preventDefault();
      }

      if (arrowDownHeld && key === "h" && !flightComboLocked) {
        flightComboLocked = true;
        toggleFlying();
        event.preventDefault();
      }

      if (event.key === "Escape") {
        if (menuBackdrop.hidden) {
          openMenu();
        } else {
          closeMenu();
        }
      }
    });

    window.addEventListener("keyup", (event) => {
      const key = event.key.toLowerCase();

      if (event.key === "ArrowUp" || key === "w") keys.up = false;
      if (event.key === "ArrowDown") {
        keys.down = false;
        arrowDownHeld = false;
        flightComboLocked = false;
      }
      if (key === "s") keys.down = false;
      if (event.key === "ArrowLeft" || key === "a") keys.left = false;
      if (event.key === "ArrowRight" || key === "d") keys.right = false;

      if (key === "h") {
        flightComboLocked = false;
      }
    });

    document.querySelectorAll("[data-pad]").forEach((button) => {
      const key = button.dataset.pad;

      if (key === "fly") {
        button.addEventListener("click", toggleFlying);
        return;
      }

      const setPressed = (pressed) => {
        keys[key] = pressed;
      };

      button.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        setPressed(true);
        button.setPointerCapture(event.pointerId);
      });

      button.addEventListener("pointerup", () => setPressed(false));
      button.addEventListener("pointercancel", () => setPressed(false));
      button.addEventListener("pointerleave", () => setPressed(false));
    });

    menuBtn.addEventListener("click", openMenu);
    closeMenuBtn.addEventListener("click", closeMenu);
    leaveBtn.addEventListener("click", leaveRoom);
    copyRoomBtn.addEventListener("click", copyRoomName);
    flyBtn.addEventListener("click", toggleFlying);

    document.querySelectorAll("[data-skin]").forEach((button) => {
      button.addEventListener("click", () => {
        changeSkin(button.dataset.skin);
      });
    });

    document.querySelectorAll("[data-reaction]").forEach((button) => {
      button.addEventListener("click", () => {
        sendReaction(button.dataset.reaction);
      });
    });

    composeCancelBtn.addEventListener("click", clearComposeState);

    chatForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const text = chatInput.value.trim().slice(0, 240);
      if (!text || !player.uid) return;

      chatInput.value = "";

      if (editingMessage) {
        await update(ref(db, `rooms/${room}/messages/${editingMessage.id}`), {
          text,
          editedAt: serverTimestamp()
        });
        clearComposeState();
        return;
      }

      const payload = {
        uid: player.uid,
        name: player.name,
        text,
        createdAt: serverTimestamp()
      };

      if (replyTarget) {
        payload.replyTo = {
          id: replyTarget.id,
          name: safeName(replyTarget.name),
          text: String(replyTarget.text || "").slice(0, 80)
        };
      }

      clearComposeState();

      await set(push(ref(db, `rooms/${room}/messages`)), payload);
    });

    function clearComposeState() {
      replyTarget = null;
      editingMessage = null;
      composeState.hidden = true;
      composeStateText.textContent = "";
      chatInput.placeholder = "メッセージを入力";
      chatForm.querySelector("button[type='submit']").textContent = "送信";
    }

    function setReplyTarget(message) {
      replyTarget = {
        id: message.id,
        name: safeName(message.name),
        text: String(message.text || "")
      };
      editingMessage = null;
      composeState.hidden = false;
      composeStateText.textContent = `${replyTarget.name} に返信: ${replyTarget.text.slice(0, 40)}`;
      chatInput.placeholder = "返信を入力";
      chatForm.querySelector("button[type='submit']").textContent = "送信";
      chatInput.focus();
    }

    function setEditTarget(message) {
      if (message.uid !== player.uid) return;

      editingMessage = {
        id: message.id,
        text: String(message.text || "")
      };
      replyTarget = null;
      composeState.hidden = false;
      composeStateText.textContent = "メッセージを編集中";
      chatInput.value = editingMessage.text;
      chatInput.placeholder = "編集内容を入力";
      chatForm.querySelector("button[type='submit']").textContent = "更新";
      chatInput.focus();
    }

    function insertMention(name) {
      const mention = `@${safeName(name)} `;
      const start = chatInput.selectionStart || 0;
      const end = chatInput.selectionEnd || 0;
      chatInput.value = chatInput.value.slice(0, start) + mention + chatInput.value.slice(end);
      const pos = start + mention.length;
      chatInput.focus();
      chatInput.setSelectionRange(pos, pos);
    }

    async function deleteMessage(message) {
      if (message.uid !== player.uid) return;

      const ok = confirm("このメッセージを削除しますか？");
      if (!ok) return;

      await remove(ref(db, `rooms/${room}/messages/${message.id}`));
    }

    async function reactToMessage(message, reactionKey) {
      if (!player.uid) return;

      const reactionPath = `rooms/${room}/messages/${message.id}/reactions/${reactionKey}/${player.uid}`;
      await set(ref(db, reactionPath), true);
    }

    async function sendReaction(emoji) {
      player.reaction = emoji;
      player.reactionUntil = Date.now() + 1800;
      await pushPlayer(true);
    }

    async function pushPlayer(force = false) {
      if (!player.uid) return;

      const now = Date.now();

      if (!force && now - state.lastPush < 35) {
        return;
      }

      state.lastPush = now;
      player.updatedAt = now;

      await update(ref(db, `rooms/${room}/players/${player.uid}`), {
        uid: player.uid,
        name: player.name,
        x: Math.round(player.x),
        y: Math.round(player.y),
        dir: player.dir,
        skin: player.skin,
        flying: player.flying,
        reaction: player.reaction || "",
        reactionUntil: player.reactionUntil || 0,
        updatedAt: player.updatedAt
      });
    }

    function subscribePlayers() {
      const playersRef = ref(db, `rooms/${room}/players`);

      onValue(playersRef, (snapshot) => {
        state.players = snapshot.val() || {};
        countLabel.textContent = String(Object.keys(state.players).length);
      });
    }

    function subscribeMessages() {
      const messagesRef = query(ref(db, `rooms/${room}/messages`), limitToLast(40));

      onValue(messagesRef, (snapshot) => {
        const data = snapshot.val() || {};
        state.messages = Object.entries(data)
          .map(([id, value]) => ({
            id,
            ...value
          }))
          .sort((a, b) => {
            const av = typeof a.createdAt === "number" ? a.createdAt : 0;
            const bv = typeof b.createdAt === "number" ? b.createdAt : 0;
            return av - bv;
          });

        renderMessages();
      });
    }

    function subscribeRoomState() {
      const roomStateRef = ref(db, `rooms/${room}/roomState`);

      onValue(roomStateRef, (snapshot) => {
        const data = snapshot.val() || {};
        const nextMapIndex = Number(data.mapIndex ?? currentMapIndex);

        if (
          Number.isFinite(nextMapIndex) &&
          nextMapIndex >= 0 &&
          nextMapIndex < MAPS.length &&
          nextMapIndex !== currentMapIndex
        ) {
          currentMapIndex = nextMapIndex;
          localStorage.setItem(LS_MAP, String(currentMapIndex));

          const spawn = MAPS[currentMapIndex].spawn || { x: 520, y: 400 };
          player.x = spawn.x + Math.random() * 80;
          player.y = spawn.y + Math.random() * 80;

          loadCurrentMapAssets();
          pushPlayer(true);
        }
      });
    }

    function renderMessages() {
      chatList.innerHTML = "";

      for (const message of state.messages) {
        const item = document.createElement("div");
        item.className = "message";
        item.dataset.messageId = message.id;

        if (message.replyTo) {
          const reply = document.createElement("div");
          reply.className = "reply-preview";
          reply.textContent = `↩ ${safeName(message.replyTo.name)}: ${String(message.replyTo.text || "").slice(0, 80)}`;
          item.appendChild(reply);
        }

        const head = document.createElement("div");
        head.className = "message-head";

        const name = document.createElement("span");
        name.className = "message-name";
        name.textContent = safeName(message.name) + ":";
        name.title = "クリックでメンション";
        name.addEventListener("click", () => insertMention(message.name));

        const time = document.createElement("span");
        time.style.color = "var(--muted)";
        time.style.fontSize = "11px";
        time.textContent = message.editedAt ? "編集済み" : "";

        head.append(name, time);

        const text = document.createElement("span");
        text.className = "message-text";
        if (message.editedAt) text.classList.add("edited");

        const rawText = String(message.text || "");
        const parts = rawText.split(/(@[^\s　]+)/g);

        for (const part of parts) {
          const span = document.createElement("span");
          span.textContent = part;
          if (part.startsWith("@")) {
            span.className = "mention";
          }
          text.appendChild(span);
        }

        const actions = document.createElement("div");
        actions.className = "message-actions";

        const mentionBtn = document.createElement("button");
        mentionBtn.type = "button";
        mentionBtn.textContent = "@";
        mentionBtn.title = "メンション";
        mentionBtn.addEventListener("click", () => insertMention(message.name));

        const replyBtn = document.createElement("button");
        replyBtn.type = "button";
        replyBtn.textContent = "返信";
        replyBtn.addEventListener("click", () => setReplyTarget(message));

        const reactSmileBtn = document.createElement("button");
        reactSmileBtn.type = "button";
        reactSmileBtn.textContent = `😄 ${countReactions(message, "smile") || ""}`.trim();
        reactSmileBtn.addEventListener("click", () => reactToMessage(message, "smile"));

        const reactHeartBtn = document.createElement("button");
        reactHeartBtn.type = "button";
        reactHeartBtn.textContent = `❤️ ${countReactions(message, "heart") || ""}`.trim();
        reactHeartBtn.addEventListener("click", () => reactToMessage(message, "heart"));

        actions.append(mentionBtn, replyBtn, reactSmileBtn, reactHeartBtn);

        if (message.uid === player.uid) {
          const editBtn = document.createElement("button");
          editBtn.type = "button";
          editBtn.textContent = "編集";
          editBtn.addEventListener("click", () => setEditTarget(message));

          const deleteBtn = document.createElement("button");
          deleteBtn.type = "button";
          deleteBtn.textContent = "削除";
          deleteBtn.addEventListener("click", () => deleteMessage(message));

          actions.append(editBtn, deleteBtn);
        }

        item.append(head, text, actions);
        chatList.appendChild(item);
      }

      chatList.scrollTop = chatList.scrollHeight;
    }

    function countReactions(message, key) {
      const users = message?.reactions?.[key] || {};
      return Object.keys(users).length;
    }

    function updatePlayerMovement(dt) {
      let dx = 0;
      let dy = 0;

      if (keys.up) dy -= 1;
      if (keys.down) dy += 1;
      if (keys.left) dx -= 1;
      if (keys.right) dx += 1;

      if (dx === 0 && dy === 0) {
        return;
      }

      if (Math.abs(dx) > Math.abs(dy)) {
        player.dir = dx < 0 ? "left" : "right";
      } else {
        player.dir = dy < 0 ? "behind" : "front";
      }

      const len = Math.hypot(dx, dy) || 1;
      dx /= len;
      dy /= len;

      const speed = player.flying ? FLY_SPEED : WALK_SPEED;
      const distance = speed * dt;

      movePlayerWithCollision(dx, dy, distance);
      pushPlayer(false);
    }

    function movePlayerWithCollision(dx, dy, distance) {
      const steps = Math.max(1, Math.ceil(distance / COLLISION_STEP_SIZE));
      const stepX = (dx * distance) / steps;
      const stepY = (dy * distance) / steps;

      for (let i = 0; i < steps; i++) {
        const nextX = clamp(player.x + stepX, 20, state.worldW - 20);
        const nextY = clamp(player.y + stepY, 20, state.worldH - 20);

        if (player.flying) {
          player.x = nextX;
          player.y = nextY;
          continue;
        }

        if (canStandAt(nextX, nextY)) {
          player.x = nextX;
          player.y = nextY;
          continue;
        }

        if (canStandAt(nextX, player.y)) {
          player.x = nextX;
        }

        if (canStandAt(player.x, nextY)) {
          player.y = nextY;
        }
      }
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function canStandAt(x, y) {
      if (!state.collisionLoaded) {
        return true;
      }

      const skin = normalizeSkin(player.skin);
      const radiusX = skin === "turuturu" ? 24 : 18;
      const footY = y;
      const bodyY = y - 18;

      const points = [
        [x, footY],
        [x - radiusX, footY],
        [x + radiusX, footY],
        [x, bodyY],
        [x - radiusX, bodyY],
        [x + radiusX, bodyY]
      ];

      return points.every(([px, py]) => canStandAtPoint(px, py));
    }

    function canStandAtPoint(x, y) {
      const image = images.collision;

      if (!image.naturalWidth || !image.naturalHeight) {
        return true;
      }

      const sx = Math.floor((x / state.worldW) * image.naturalWidth);
      const sy = Math.floor((y / state.worldH) * image.naturalHeight);

      if (sx < 0 || sy < 0 || sx >= image.naturalWidth || sy >= image.naturalHeight) {
        return false;
      }

      try {
        let off = canStandAt.offscreen;
        let offCtx = canStandAt.ctx;

        if (!off || canStandAt.mapIndex !== currentMapIndex) {
          off = document.createElement("canvas");
          off.width = image.naturalWidth;
          off.height = image.naturalHeight;

          offCtx = off.getContext("2d", { willReadFrequently: true });
          offCtx.drawImage(image, 0, 0);

          canStandAt.offscreen = off;
          canStandAt.ctx = offCtx;
          canStandAt.mapIndex = currentMapIndex;
        }

        const pixel = offCtx.getImageData(sx, sy, 1, 1).data;
        const r = pixel[0];
        const g = pixel[1];
        const b = pixel[2];
        const a = pixel[3];

        if (a < 10) {
          return true;
        }

        const brightness = (r + g + b) / 3;

        return brightness >= COLLISION_WALKABLE_BRIGHTNESS;
      } catch (error) {
        console.warn(error);
        return true;
      }
    }

    function updateCamera() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;

      camera.x = clamp(player.x - vw / 2, 0, Math.max(0, state.worldW - vw));
      camera.y = clamp(player.y - vh / 2, 0, Math.max(0, state.worldH - vh));
    }

    function draw() {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

      drawMap();

      const players = Object.values(state.players || {})
        .filter((p) => p && Number.isFinite(p.x) && Number.isFinite(p.y))
        .map((p) => {
          if (p.uid === player.uid) {
            return {
              ...p,
              x: player.x,
              y: player.y,
              dir: player.dir,
              skin: player.skin,
              flying: player.flying,
              reaction: player.reaction,
              reactionUntil: player.reactionUntil
            };
          }

          return p;
        })
        .sort((a, b) => {
          const ay = a.flying ? a.y + 1000 : a.y;
          const by = b.flying ? b.y + 1000 : b.y;
          return ay - by;
        });

      for (const p of players) {
        drawPlayer(p);
      }
    }

    function drawMap() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;

      if (state.mapLoaded) {
        ctx.drawImage(
          images.map,
          camera.x,
          camera.y,
          vw,
          vh,
          0,
          0,
          vw,
          vh
        );
        return;
      }

      ctx.fillStyle = "#123524";
      ctx.fillRect(0, 0, vw, vh);

      const gridSize = 64;
      ctx.strokeStyle = "rgba(255,255,255,0.08)";
      ctx.lineWidth = 1;

      const startX = -camera.x % gridSize;
      const startY = -camera.y % gridSize;

      for (let x = startX; x < vw; x += gridSize) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, vh);
        ctx.stroke();
      }

      for (let y = startY; y < vh; y += gridSize) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(vw, y);
        ctx.stroke();
      }

      ctx.fillStyle = "#e2e8f0";
      ctx.font = "900 18px system-ui, sans-serif";
      ctx.fillText("マップ画像を読み込み中、または未配置です", 24, 42);
    }

    function drawPlayer(p) {
      const skin = normalizeSkin(p.skin);
      const dir = normalizeDir(p.dir);
      const flying = Boolean(p.flying);

      const sx = p.x - camera.x;
      const sy = p.y - camera.y;

      ctx.save();

      ctx.globalAlpha = p.uid === player.uid ? 1 : 0.92;

      if (flying) {
        drawAirplane(p, sx, sy);
      } else {
        drawCharacter(skin, dir, sx, sy);
      }

      drawName(p, sx, sy, flying);
      drawReaction(p, sx, sy, flying);

      ctx.restore();
    }

    function drawAirplane(p, sx, sy) {
      const image = images.airplane;
      const skin = normalizeSkin(p.skin);
      const dir = normalizeDir(p.dir);

      let w = 240;
      let h = AIRPLANE_HEIGHT;

      if (image.complete && image.naturalWidth) {
        h = AIRPLANE_HEIGHT;
        w = h * image.naturalWidth / image.naturalHeight;

        ctx.save();

        /*
          nikori_airplane.png が右向き画像前提。
          左移動時だけ左右反転する。
          もし向きが逆だった場合は、ここを dir === "right" に変更。
        */
        if (dir === "left") {
          ctx.translate(sx, 0);
          ctx.scale(-1, 1);
          ctx.drawImage(image, -w / 2, sy - h + 18, w, h);
        } else {
          ctx.drawImage(image, sx - w / 2, sy - h + 18, w, h);
        }

        ctx.restore();
      } else {
        ctx.fillStyle = "#e0f2fe";
        ctx.beginPath();
        ctx.ellipse(sx, sy - 105, 120, 48, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#0f172a";
        ctx.fillRect(sx - 18, sy - 135, 36, 36);
      }

      drawTinyPilot(skin, sx, sy - 210);
    }

    function drawTinyPilot(skin, sx, sy) {
      const image = images.skins[skin]?.front;
      const h = skin === "turuturu" ? 56 : 60;
      const w = h;

      if (image && image.complete && image.naturalWidth) {
        ctx.drawImage(image, sx - w / 2, sy - h / 2, w, h);
      }
    }

    function drawCharacter(skin, dir, sx, sy) {
      const image = images.skins[skin]?.[dir] || images.skins.nikorihito.front;
      const h = DRAW_HEIGHT[skin] || DRAW_HEIGHT.nikorihito;

      let w = h;

      if (image.complete && image.naturalWidth) {
        w = h * image.naturalWidth / image.naturalHeight;
        ctx.drawImage(image, sx - w / 2, sy - h, w, h);
      } else {
        ctx.fillStyle = skin === "turuturu" ? "#4dd7f0" : "#ffffff";
        ctx.fillRect(sx - w / 2, sy - h, w, h);
        ctx.strokeStyle = "#0f172a";
        ctx.lineWidth = 3;
        ctx.strokeRect(sx - w / 2, sy - h, w, h);
      }

      ctx.globalAlpha *= 0.28;
      ctx.fillStyle = "#000000";
      ctx.beginPath();
      ctx.ellipse(sx, sy + 3, Math.max(14, w * 0.35), 7, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    function drawName(p, sx, sy, flying) {
      const y = flying ? sy - AIRPLANE_HEIGHT - 20 : sy - (DRAW_HEIGHT[normalizeSkin(p.skin)] || 70) - 18;

      ctx.font = "900 13px system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      const text = safeName(p.name);
      const metrics = ctx.measureText(text);
      const width = metrics.width + 16;

      ctx.fillStyle = "rgba(2,6,23,0.68)";
      roundRect(ctx, sx - width / 2, y - 12, width, 24, 12);
      ctx.fill();

      ctx.fillStyle = p.uid === player.uid ? "#a5f3fc" : "#e2e8f0";
      ctx.fillText(text, sx, y);
    }

    function drawReaction(p, sx, sy, flying) {
      if (!p.reaction || !p.reactionUntil || Date.now() > p.reactionUntil) {
        return;
      }

      const y = flying ? sy - AIRPLANE_HEIGHT - 54 : sy - (DRAW_HEIGHT[normalizeSkin(p.skin)] || 70) - 50;

      ctx.font = "28px system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(p.reaction, sx, y);
    }

    function roundRect(context, x, y, w, h, r) {
      const radius = Math.min(r, w / 2, h / 2);

      context.beginPath();
      context.moveTo(x + radius, y);
      context.lineTo(x + w - radius, y);
      context.quadraticCurveTo(x + w, y, x + w, y + radius);
      context.lineTo(x + w, y + h - radius);
      context.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
      context.lineTo(x + radius, y + h);
      context.quadraticCurveTo(x, y + h, x, y + h - radius);
      context.lineTo(x, y + radius);
      context.quadraticCurveTo(x, y, x + radius, y);
      context.closePath();
    }

    function loop(now) {
      const dt = Math.min(0.05, Math.max(0.001, (now - state.lastFrame) / 1000));
      state.lastFrame = now;

      updatePlayerMovement(dt);
      updateCamera();
      draw();

      requestAnimationFrame(loop);
    }

    async function start(user) {
      if (state.started) return;
      state.started = true;

      player.uid = user.uid;
      player.name = safeName(playerName || user.displayName || "ゲスト");
      player.skin = selectedSkin;
      player.dir = "front";

      loading.hidden = true;
      chatStatus.textContent = "接続済み";

      const playerRef = ref(db, `rooms/${room}/players/${player.uid}`);

      await set(playerRef, {
        uid: player.uid,
        name: player.name,
        x: Math.round(player.x),
        y: Math.round(player.y),
        dir: player.dir,
        skin: player.skin,
        flying: player.flying,
        reaction: "",
        reactionUntil: 0,
        joinedAt: serverTimestamp(),
        updatedAt: Date.now()
      });

      await update(ref(db, `roomMeta/${room}`), {
        room,
        passwordEnabled: false,
        updatedAt: Date.now()
      });

      await update(ref(db, `rooms/${room}/roomState`), {
        mapIndex: currentMapIndex,
        updatedAt: serverTimestamp()
      }).catch(console.warn);

      onDisconnect(playerRef).remove();

      subscribePlayers();
      subscribeMessages();
      subscribeRoomState();
      refreshSkinButtons();
      refreshMapButtons();
      updateFlyButtonState();

      requestAnimationFrame((time) => {
        state.lastFrame = time;
        requestAnimationFrame(loop);
      });
    }

    onAuthStateChanged(auth, async (user) => {
      try {
        if (!user) {
          const result = await signInAnonymously(auth);
          await start(result.user);
          return;
        }

        await start(user);
      } catch (error) {
        console.error(error);
        loading.textContent = "接続に失敗しました。Firebaseの設定を確認してください。";
      }
    });

    window.addEventListener("beforeunload", () => {
      if (player.uid) {
        remove(ref(db, `rooms/${room}/players/${player.uid}`));
      }
    });
  </script>
</body>
</html>
